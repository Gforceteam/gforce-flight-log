<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flight Log" />
  <link rel="apple-touch-icon" href="/gforce-flight-log/icon-192.png" />
  <link rel="manifest" href="/gforce-flight-log/manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <title>Gforce Flight Log</title>
  <style>
    :root {
      --bg: #121212;
      --surface: #1c1c1c;
      --card: #222222;
      --border: #333333;
      --accent: #f37329;
      --accent2: rgba(243,115,41,0.15);
      --danger: #ef5350;
      --warning: #ffb74d;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── LOGIN ─────────────────────────────────────────────────────────── */
    #login-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      background: var(--card);
    }
    #login-page .login-logo {
      width: 72px;
      height: 72px;
      background: var(--accent);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      font-size: 32px;
    }
    #login-page h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; color: var(--accent); letter-spacing: 2px; font-family: 'Montserrat', sans-serif; }
    #login-page .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .login-card select, .login-card input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
      appearance: none;
      -webkit-appearance: none;
    }
    .login-card select:focus, .login-card input:focus { border-color: var(--accent); }
    .login-card button {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 9999px;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .login-card button:hover { background: #e5681f; }
    .login-card button:active { opacity: 0.9; }
    .login-error { color: var(--danger); font-size: 13px; margin-top: 10px; text-align: center; display: none; }
    .login-card select option.office-option { color: var(--accent); font-weight: 600; }

    /* ── PILOT APP ─────────────────────────────────────────────────────── */
    #app-page { display: none; }

    .status-bar {
      background: var(--surface);
      border-bottom: 3px solid var(--accent);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .pilot-left { display: flex; align-items: center; gap: 10px; }
    .pilot-avatar-sm {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--accent); border: 1px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff;
    }
    .pilot-greeting { font-size: 12px; color: var(--muted); }
    .pilot-name-sm { font-size: 14px; font-weight: 600; }
    .status-right { display: flex; align-items: center; gap: 8px; }
    .status-badge {
      font-size: 12px; font-weight: 700; padding: 4px 10px;
      border-radius: 20px;
    }
    .status-badge.in-office { background: var(--accent); color: #fff; }
    .status-badge.airborne { background: var(--warning); color: #292f36; }
    .server-badge {
      font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 600;
    }
    .server-badge.synced { background: var(--accent); color: #fff; }
    .server-badge.offline { background: var(--danger); color: #fff; }

    nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: #292f36;
      border-top: 1px solid rgba(255,255,255,0.1);
      display: flex;
      z-index: 100;
    }
    nav button {
      flex: 1; padding: 12px 0 16px; background: none; border: none;
      color: var(--muted); font-size: 11px; display: flex;
      flex-direction: column; align-items: center; gap: 4px;
      cursor: pointer; transition: color 0.15s;
    }
    nav button.active { color: var(--accent); }
    nav button svg { width: 22px; height: 22px; }

    .page { display: none; padding: 16px; max-width: 500px; margin: 0 auto; }
    .page.active { display: block; }

    .page-header {
      padding: 16px 16px 0;
      max-width: 500px;
      margin: 0 auto;
    }
    .page-header h1 { font-size: 28px; font-weight: 700; padding-top: env(safe-area-inset-top, 16px); color: var(--accent); font-family: 'Montserrat', sans-serif; letter-spacing: 1px; }
    .page-header p { color: var(--muted); font-size: 13px; margin-top: 2px; }

    .dashboard-status { text-align: center; padding: 30px 20px; }
    .dashboard-status-icon { font-size: 64px; margin-bottom: 12px; }
    .dashboard-status-label { font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .dashboard-status-value { font-size: 24px; font-weight: 700; }
    .dashboard-client { font-size: 18px; color: var(--accent); margin-top: 6px; }
    .dashboard-timer {
      font-size: 48px; font-weight: 700; color: var(--warning);
      font-variant-numeric: tabular-nums; margin: 20px 0;
    }
    .dashboard-timer.urgent { color: var(--danger); }
    .btn-log-flight {
      width: 100%; padding: 18px; background: var(--accent);
      border: none; border-radius: 9999px; color: #fff;
      font-size: 18px; font-weight: 700; cursor: pointer;
      margin-top: 16px;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .btn-log-flight:hover { background: #e5681f; }
    .btn-log-flight:active { opacity: 0.9; }

    .btn-extend {
      width: 100%; padding: 12px; background: transparent;
      border: 1px solid var(--accent); border-radius: 9999px; color: var(--accent);
      font-size: 14px; font-weight: 600; cursor: pointer;
      margin-top: 8px;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .btn-extend:hover { background: var(--accent); color: #fff; }
    .btn-extend:active { opacity: 0.8; }
    .btn-extend:disabled { opacity: 0.4; cursor: not-allowed; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--accent); font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
    .card.editing { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

    .field { margin-bottom: 14px; }
    .field label {
      display: block; font-size: 12px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 10px 12px;
      font-size: 16px; outline: none; appearance: none; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 70px; font-size: 14px; }

    .flight-num-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .flight-num-row label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; min-width: 90px; }
    .flight-num-controls { display: flex; align-items: center; flex: 1; gap: 6px; }
    .flight-num-btn {
      width: 40px; height: 40px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-size: 20px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center; line-height: 1; padding: 0;
    }
    .flight-num-btn:active { background: var(--border); }
    .flight-num-display {
      flex: 1; text-align: center; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--accent); font-size: 18px; font-weight: 700;
      padding: 8px; min-width: 48px;
    }

    .weight-slider-row { display: flex; align-items: center; gap: 12px; }
    .weight-slider {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 6px; background: var(--border); border-radius: 3px;
      outline: none; cursor: pointer;
    }
    .weight-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 24px; height: 24px; background: var(--accent); border-radius: 50%; cursor: pointer;
    }
    .weight-slider::-moz-range-thumb {
      width: 24px; height: 24px; background: var(--accent);
      border-radius: 50%; cursor: pointer; border: none;
    }
    .weight-value {
      min-width: 52px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 16px; font-weight: 600;
      padding: 8px 10px; text-align: center;
    }

    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-group button {
      flex: 1; min-width: 48px; padding: 10px 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .btn-group button.selected { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
    .btn-group.site button { font-size: 13px; }

    .btn-primary {
      width: 100%; padding: 14px; background: var(--accent); border: none;
      border-radius: var(--radius); color: #000; font-size: 16px;
      font-weight: 700; cursor: pointer; margin-top: 4px;
    }
    .btn-primary:active { opacity: 0.8; }
    .btn-secondary {
      width: 100%; padding: 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    .btn-cancel {
      width: 100%; padding: 12px; background: transparent;
      border: 1px solid var(--danger); border-radius: var(--radius);
      color: var(--danger); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    .btn-danger {
      background: var(--surface); border: 1px solid var(--danger);
      border-radius: 8px; color: var(--danger);
      font-size: 13px; padding: 6px 12px; cursor: pointer;
    }
    .btn-edit {
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 8px; color: var(--accent);
      font-size: 13px; padding: 6px 10px; cursor: pointer;
    }

    .flight-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .flight-meta { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .flight-badge {
      background: var(--accent); color: #000; border-radius: 20px;
      padding: 2px 10px; font-size: 12px; font-weight: 700;
    }
    .flight-badge.green { background: var(--accent2); }
    .flight-badge.client { background: var(--accent2); }

    .date-group-header {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 12px 0 6px; display: flex; justify-content: space-between; align-items: center;
    }
    .duty-badge {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; font-size: 11px; color: var(--accent2); padding: 2px 8px;
    }

    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; text-align: center;
    }
    .stat-number { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* ── OFFICE DASHBOARD ──────────────────────────────────────────────── */
    #office-dashboard { display: none; padding-bottom: 0; }

    .office-header {
      background: #292f36;
      border-bottom: 3px solid var(--accent);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .office-header h1 { font-size: 22px; font-weight: 700; color: var(--accent); font-family: 'Montserrat', sans-serif; letter-spacing: 1px; }
    .office-header-right { display: flex; align-items: center; gap: 12px; }
    .ws-indicator { width: 10px; height: 10px; border-radius: 50%; background: var(--danger); }
    .ws-indicator.connected { background: var(--accent); }
    .office-logout-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-size: 13px; padding: 6px 12px; cursor: pointer;
    }

    .office-tab-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .office-tab-btn {
      flex: 1; padding: 12px; background: none; border: none;
      color: var(--muted); font-size: 14px; font-weight: 600;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .office-tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    #office-alert-banner {
      display: none;
      background: var(--danger);
      color: #fff;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
    #office-alert-banner.show { display: block; }

    .office-content { padding: 20px; max-width: 900px; margin: 0 auto; }
    .office-tab-content { display: none; }
    .office-tab-content.active { display: block; }

    .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; margin-top: 20px; }
    .section-title:first-child { margin-top: 0; }

    .pilot-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .pilot-card.airborne { border-color: var(--warning); }
    .pilot-card.alert { border-color: var(--danger); }

    .pilot-card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .pilot-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: var(--accent); flex-shrink: 0;
    }
    .pilot-info { flex: 1; min-width: 0; }
    .pilot-name { font-size: 16px; font-weight: 600; }
    .pilot-status { font-size: 13px; margin-top: 2px; }
    .pilot-status.in-office { color: var(--accent); font-weight: 600; }
    .pilot-status.airborne { color: var(--warning); }
    .pilot-client { font-size: 13px; color: var(--accent); margin-top: 2px; font-weight: 600; }

    .timer-display {
      font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--warning); margin-bottom: 10px;
    }
    .timer-display.urgent { color: var(--danger); }

    .pilot-client-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .pilot-client-row label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .pilot-client-row input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 7px 10px;
      font-size: 14px; outline: none;
    }
    .pilot-client-row input:focus { border-color: var(--accent); }

    .pilot-actions { display: flex; gap: 8px; }
    .btn-leave {
      padding: 8px 14px; background: var(--warning); border: none;
      border-radius: 8px; color: #000; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-landed {
      padding: 8px 14px; background: var(--accent); border: none;
      border-radius: 8px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
    }

    .flight-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .flight-table th {
      text-align: left; padding: 8px 10px; background: var(--surface);
      color: var(--muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
    }
    .flight-table td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .flight-table tr:last-child td { border-bottom: none; }
    .flight-table .pilot-col { font-weight: 600; color: var(--accent); }
    .flight-table .client-col { color: var(--muted); font-size: 12px; }
    .flight-table .time-col { color: var(--muted); font-size: 12px; }
    .flight-table .badge {
      display: inline-block; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 2px 8px; font-size: 11px; color: var(--text);
    }

    .export-bar { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center; }
    .flights-search-bar { margin-bottom: 14px; position: relative; }
    .flights-search-bar input {
      width: 100%; padding: 10px 14px 10px 36px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); font-size: 14px; box-sizing: border-box;
    }
    .flights-search-bar input::placeholder { color: var(--muted); }
    .flights-search-bar input:focus { outline: none; border-color: var(--accent); }
    .flights-search-bar .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--muted); font-size: 15px; pointer-events: none;
    }
    .flights-result-count { font-size: 12px; color: var(--muted); margin-bottom: 10px; }
    .btn-export-all {
      padding: 8px 16px; background: var(--accent); border: none;
      border-radius: 8px; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-export-pilot {
      padding: 8px 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer;
    }
    .btn-export-pilot:hover { border-color: var(--accent); color: var(--accent); }
    .btn-export-pilot.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

    /* ── TODAY TAB ─────────────────────────────────────────────────────── */
    .today-summary {
      font-size: 13px; color: var(--muted); margin-bottom: 14px;
    }
    .today-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .today-table th {
      text-align: left; padding: 8px 10px; background: var(--surface);
      color: var(--muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
    }
    .today-table th.sortable {
      cursor: pointer; user-select: none;
    }
    .today-table th.sortable:hover { color: var(--accent); }
    .today-table th.sort-active { color: var(--accent); }
    .today-table th .sort-arrow { margin-left: 4px; font-size: 9px; }
    .today-table td {
      padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: top;
    }
    .today-table tr:last-child td { border-bottom: none; }
    .today-table .col-pilot { font-weight: 600; color: var(--accent); }
    .today-table .col-time { color: var(--muted); font-size: 12px; white-space: nowrap; }

    /* ── STATS EXTRAS ──────────────────────────────────────────────────── */
    .stat-section { margin-bottom: 12px; }
    .stat-section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--muted); margin-bottom: 10px; }
    .wing-progress-wrap { margin-top: 10px; background: var(--surface); border-radius: 6px; height: 8px; overflow: hidden; }
    .wing-progress-bar { height: 100%; border-radius: 6px; transition: width 0.5s; }
    .wing-bar-ok   { background: #4a8f1e; }
    .wing-bar-warn { background: #c07000; }
    .wing-bar-danger { background: #c0392b; }
    .month-chart { margin-top: 4px; }
    .month-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .month-label { width: 28px; color: var(--muted); font-size: 11px; text-align: right; flex-shrink: 0; }
    .month-bar-wrap { flex: 1; background: var(--surface); border-radius: 4px; height: 18px; overflow: hidden; }
    .month-bar { background: var(--accent); height: 100%; border-radius: 4px; transition: width 0.4s; min-width: 0; }
    .month-count { width: 22px; font-size: 12px; font-weight: 600; color: var(--text); text-align: right; flex-shrink: 0; }
    #f-wing { text-transform: uppercase; }

    /* ── FLIGHT FOLLOWING ──────────────────────────────────────────────── */
    .ff-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .ff-table { border-collapse: collapse; font-size: 12px; min-width: 600px; }
    .ff-table th, .ff-table td {
      padding: 5px 8px; border: 1px solid var(--border); text-align: center; white-space: nowrap;
    }
    .ff-table th {
      background: var(--surface); color: var(--muted); font-size: 11px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .ff-table th.ff-today-col { color: var(--accent); }
    .ff-table td.ff-today-col { background: rgba(243,115,41,0.08); }
    .ff-pilot-name { text-align: left !important; font-weight: 600; min-width: 70px; }
    .ff-day-val { font-weight: 600; color: var(--text); }
    .ff-total { font-weight: 700; color: #fff; min-width: 52px; }
    .ff-ok        { background: #4a8f1e; }  /* 6–14 days left: green */
    .ff-warn      { background: #c07000; }  /* 5 days left: yellow/amber */
    .ff-warn-hard { background: #c05800; }  /* 3 days left: orange */
    .ff-limit     { background: #c0392b; }  /* ≤2 days left: red */
    #page-ff { padding: 0; }
    #ff-content { padding: 12px 16px; }

    /* ── SHARED ────────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; opacity: 0;
      pointer-events: none; transition: opacity 0.3s; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; }
    .hidden { display: none !important; }
    .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 15px; }
  </style>
</head>
<body>

<!-- ── LOGIN PAGE ──────────────────────────────────────────────────────────── -->

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const API_BASE = 'https://gforce-api.fly.dev';

// ─── Pilot State ─────────────────────────────────────────────────────────────
let pilotToken = localStorage.getItem('gforce_pilot_token');
let pilotId = localStorage.getItem('gforce_pilot_id');
let pilotName = localStorage.getItem('gforce_pilot_name');
let editingId = null;
let myFlights = [];
let myDrives = [];
let statsMonthOffset = 0; // 0 = current month, -1 = last month, etc.
let myStatus = { status: 'in_office', client_name: null, timer_expires_at: null };

// ─── Office State ─────────────────────────────────────────────────────────────
let officeToken = localStorage.getItem('gforce_office_token');
let ws = null;
let officePilots = [];
let allFlights = [];
let alertDismissed = new Set();
let timerInterval;
let todaySort = { col: 'time', dir: 'asc' }; // col: 'time'|'pilot'|'client', dir: 'asc'|'desc'
let flightsSearch = '';
let currentWing = '';

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (pilotToken && pilotId) {
    showApp(pilotName);
  } else if (officeToken) {
    showOfficeDashboard();
  } else {
    loadPilotList();
  }

  document.getElementById('pilot-select').addEventListener('change', function() {
    const pinInput = document.getElementById('pilot-pin');
    if (this.value === '__office__') {
      pinInput.placeholder = 'Office password';
      pinInput.removeAttribute('inputmode');
    } else {
      pinInput.placeholder = 'Enter PIN';
      pinInput.setAttribute('inputmode', 'numeric');
    }
  });
});

// ─── Load Pilot List ──────────────────────────────────────────────────────────
async function loadPilotList() {
  const sel = document.getElementById('pilot-select');
  sel.innerHTML = '<option value="">Select...</option><option value="__office__" class="office-option">— Office —</option>';
  try {
    const res = await fetch(`${API_BASE}/api/public/pilots`);
    const pilots = await res.json();
    pilots.forEach(p => {
      sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    });
    sel.value = pilotId || '';
  } catch {
    document.getElementById('login-error2').style.display = 'block';
    document.getElementById('login-error2').textContent = 'Cannot reach server';
  }
}

// ─── Login ────────────────────────────────────────────────────────────────────
async function doLogin() {
  const select = document.getElementById('pilot-select');
  const selectedVal = select.value;
  const pin = document.getElementById('pilot-pin').value;

  document.getElementById('login-error').style.display = 'none';
  document.getElementById('login-error2').style.display = 'none';

  if (!selectedVal || !pin) {
    document.getElementById('login-error').textContent = 'Select a pilot or office, then enter your PIN / password';
    document.getElementById('login-error').style.display = 'block';
    return;
  }

  if (selectedVal === '__office__') {
    try {
      const res = await fetch(`${API_BASE}/api/auth/office`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pin })
      });
      const data = await res.json();
      if (data.token) {
        officeToken = data.token;
        localStorage.setItem('gforce_office_token', officeToken);
        showOfficeDashboard();
      } else {
        document.getElementById('login-error').textContent = 'Incorrect office password';
        document.getElementById('login-error').style.display = 'block';
      }
    } catch {
      document.getElementById('login-error2').textContent = 'Cannot reach server';
      document.getElementById('login-error2').style.display = 'block';
    }
    return;
  }

  // Pilot login
  const name = select.options[select.selectedIndex].text;
  try {
    const res = await fetch(`${API_BASE}/api/auth/pilot`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, pin })
    });
    const data = await res.json();
    if (data.token) {
      pilotToken = data.token;
      pilotId = data.pilot.id;
      pilotName = data.pilot.name;
      localStorage.setItem('gforce_pilot_token', pilotToken);
      localStorage.setItem('gforce_pilot_id', pilotId);
      localStorage.setItem('gforce_pilot_name', pilotName);
      showApp(pilotName);
    } else {
      document.getElementById('login-error').textContent = 'Invalid PIN. Try again.';
      document.getElementById('login-error').style.display = 'block';
    }
  } catch {
    document.getElementById('login-error2').textContent = 'Cannot reach server';
    document.getElementById('login-error2').style.display = 'block';
  }
}

// ─── Pilot Logout ─────────────────────────────────────────────────────────────
function doLogout() {
  pilotToken = pilotId = pilotName = null;
  clearInterval(window._statusPoll);
  localStorage.removeItem('gforce_pilot_token');
  localStorage.removeItem('gforce_pilot_id');
  localStorage.removeItem('gforce_pilot_name');
  document.getElementById('app-page').style.display = 'none';
  document.getElementById('bottom-nav').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('pilot-pin').value = '';
  loadPilotList();
}

// ─── Pilot App Shell ──────────────────────────────────────────────────────────
function showApp(name) {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app-page').style.display = 'block';
  document.getElementById('bottom-nav').style.display = 'flex';
  document.getElementById('pilot-name-display').textContent = name;
  document.getElementById('pilot-avatar').textContent = name.charAt(0).toUpperCase();
  setupBtnGroups();
  setupForm();
  loadMyData();
  startStatusPoll();
  // Request notification permission early so it's ready when sent away
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

function startStatusPoll() {
  clearInterval(window._statusPoll);
  window._statusPoll = setInterval(async () => {
    if (!pilotToken) { clearInterval(window._statusPoll); return; }
    try {
      const res = await api('/api/my-status');
      if (!res.ok) return;
      const newStatus = await res.json();
      const prevStatus = myStatus.status;
      const prevGroupPilots = (myStatus.group_pilots || []).join(',');
      myStatus = { status: newStatus.status, client_name: newStatus.client_name, timer_expires_at: newStatus.timer_expires_at, group_name: newStatus.group_name || null, group_pilots: newStatus.group_pilots || [], group_id: newStatus.group_id || null, is_peak_trip: newStatus.is_peak_trip || false };
      if (newStatus.current_wing && newStatus.current_wing !== currentWing) {
        currentWing = newStatus.current_wing;
        const wingEl = document.getElementById('f-wing');
        if (wingEl) wingEl.value = currentWing;
      }
      const groupPilotsChanged = (newStatus.group_pilots || []).join(',') !== prevGroupPilots;
      if (newStatus.status !== prevStatus || groupPilotsChanged) {
        renderDashboard();
        updateStatusBadge();
        if (newStatus.status === 'airborne' && prevStatus === 'in_office') {
          notifyPilotSentAway();
        }
      }
    } catch {}
  }, 15000);
}

function setupForm() {
  const dateEl = document.getElementById('f-date');
  dateEl.value = todayStr();
  const hd1 = document.getElementById('header-date'); if (hd1) hd1.textContent = fmtDate(todayStr());
  const wingEl = document.getElementById('f-wing');
  if (wingEl) wingEl.value = currentWing;
  updateWeightDisplay();
  onDateChange();
}

// ─── Pilot API ────────────────────────────────────────────────────────────────
function api(path, opts = {}) {
  return fetch(`${API_BASE}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${pilotToken}`,
      ...opts.headers
    }
  });
}

async function loadMyData() {
  try {
    const [statusRes, flightsRes, drivesRes] = await Promise.all([
      api('/api/my-status'),
      api('/api/flights'),
      api('/api/drives')
    ]);
    if (statusRes.status === 401 || flightsRes.status === 401) { doLogout(); return; }
    myStatus = await statusRes.json();
    myFlights = flightsRes.ok ? await flightsRes.json() : [];
    myDrives = drivesRes.ok ? await drivesRes.json() : [];
    renderDashboard();
    renderFlights();
    updateStatusBadge();
    setServerStatus('synced');
    if (editingId === null) {
      const dateEl = document.getElementById('f-date');
      if (dateEl) updateFlightNumForDate(dateEl.value);
    }
  } catch {
    setServerStatus('offline');
  }
}

function updateStatusBadge() {
  const badge = document.getElementById('status-badge');
  const sub = document.getElementById('header-dashboard-sub');
  if (myStatus.status === 'airborne') {
    badge.textContent = 'Away';
    badge.className = 'status-badge airborne';
    sub.textContent = '';
  } else {
    badge.textContent = 'In Office';
    badge.className = 'status-badge in-office';
    sub.textContent = '';
  }
}

function renderDashboard() {
  const el = document.getElementById('dashboard-content');
  if (myStatus.status === 'airborne') {
    const expires = myStatus.timer_expires_at ? new Date(myStatus.timer_expires_at).getTime() : 0;
    el.innerHTML = `
      <div class="dashboard-status-icon">🪂</div>
      <div class="dashboard-status-label">Currently Away</div>
      ${myStatus.group_name ? `<div class="dashboard-client" style="font-size:16px;">📋 ${myStatus.group_name}</div>` : ''}
      ${myStatus.group_pilots && myStatus.group_pilots.length ? `
        <div style="margin-top:10px;padding:10px 14px;background:var(--surface);border-radius:10px;border:1px solid var(--border);">
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Flying with</div>
          <div style="font-size:15px;font-weight:600;color:var(--text);">${myStatus.group_pilots.join(' · ')}</div>
        </div>` : ''}
      <div class="dashboard-timer" id="dashboard-timer">--:--</div>
      <button class="btn-log-flight" onclick="goToLogFlight()">Log Flight</button>
      <button class="btn-extend" id="btn-extend" onclick="extendMyTimer()">+ 30 Minutes</button>
    `;
    startDashboardCountdown(myStatus.timer_expires_at);
  } else {
    clearInterval(window._dashboardTimer);
    el.innerHTML = `
      <div class="dashboard-status-icon">🏢</div>
      <div class="dashboard-status-label">Status</div>
      <div class="dashboard-status-value">In Office</div>
      <p style="color:var(--muted);font-size:14px;margin-top:8px">Waiting for office to start timer</p>
    `;
  }
}

function goToLogFlight() { showPage('log'); }

async function extendMyTimer() {
  const btn = document.getElementById('btn-extend');
  if (!btn) return;
  btn.disabled = true;
  btn.textContent = 'Extending...';
  try {
    const res = await api('/api/pilot/extend-timer', { method: 'POST' });
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    myStatus.timer_expires_at = data.expires_at;
    startDashboardCountdown(data.expires_at);
    toast('Timer extended by 30 minutes');
  } catch (e) {
    toast('Could not extend timer: ' + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '+ 30 Minutes';
  }
}

function startDashboardCountdown(expires_at) {
  clearInterval(window._dashboardTimer);
  const expires = new Date(expires_at).getTime();
  window._dashboardTimer = setInterval(() => {
    const now = Date.now();
    const remaining = expires - now;
    const timerEl = document.getElementById('dashboard-timer');
    if (!timerEl) { clearInterval(window._dashboardTimer); return; }
    if (remaining <= 0) {
      timerEl.textContent = 'EXPIRED';
      timerEl.classList.add('urgent');
    } else {
      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      timerEl.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
      timerEl.classList.toggle('urgent', remaining < 600000);
    }
  }, 1000);
}

// ─── Pilot Date Utils ─────────────────────────────────────────────────────────
const NZ_TZ = 'Pacific/Auckland';
function todayStr() { return new Date().toLocaleDateString('en-CA', { timeZone: NZ_TZ }); }
function fmtDate(s) {
  const d = new Date(s + 'T12:00:00');
  return d.toLocaleDateString('en-NZ', { weekday:'short', day:'numeric', month:'short' });
}
function getWeekStart(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const day = d.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toLocaleDateString('en-CA', { timeZone: NZ_TZ });
}
function getWeekEnd(weekStart) {
  const d = new Date(weekStart + 'T12:00:00');
  d.setDate(d.getDate() + 6);
  return d.toLocaleDateString('en-CA', { timeZone: NZ_TZ });
}

// ─── Pilot Button Groups ──────────────────────────────────────────────────────
function setupBtnGroups() {
  document.querySelectorAll('.btn-group').forEach(group => {
    group.addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      group.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
}
function getGroupVal(id) {
  const sel = document.querySelector(`#${id} button.selected`);
  return sel ? sel.dataset.val : null;
}
function setGroupVal(id, val) {
  const btn = document.querySelector(`#${id} button[data-val="${val}"]`);
  if (btn) {
    document.querySelectorAll(`#${id} button`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }
}

function updateWeightDisplay() {
  document.getElementById('f-weight-display').textContent = document.getElementById('f-weight').value + ' kg';
}
function updateFlightNumForDate(date) {
  if (editingId !== null) return;
  const todayFlights = myFlights.filter(f => f.date === date);
  document.getElementById('f-num-display').textContent = todayFlights.length + 1;
}
function adjustFlightNum(delta) {
  const display = document.getElementById('f-num-display');
  const current = parseInt(display.textContent);
  display.textContent = Math.max(1, current + delta);
}
function onDateChange() {
  const date = document.getElementById('f-date').value;
  const hd2 = document.getElementById('header-date'); if (hd2) hd2.textContent = fmtDate(date);
  updateFlightNumForDate(date);
}

let isPeakDrive = false;

// ─── Save Flight ──────────────────────────────────────────────────────────────
async function saveFlight() {
  if (myStatus.status !== 'airborne') {
    toast('You must be sent away by office before logging a flight');
    return;
  }

  const date = document.getElementById('f-date').value;
  const notes = document.getElementById('f-notes').value;

  // Peak Drive mode — log to drives (separate from flights, no client data needed)
  if (isPeakDrive) {
    setServerStatus('syncing');
    try {
      const res = await api('/api/drives', {
        method: 'POST',
        body: JSON.stringify({ date, notes, group_id: myStatus.group_id || null })
      });
      if (!res.ok) throw new Error(await res.text());
      toast('🚗 Drive logged!');
      resetForm();
      await loadMyData();
    } catch (e) {
      toast('Save failed: ' + e.message);
      setServerStatus('offline');
    }
    return;
  }

  const flightNum = parseInt(document.getElementById('f-num-display').textContent);
  const weight = document.getElementById('f-weight').value;
  const takeoff = getGroupVal('fg-takeoff');
  const landing = getGroupVal('fg-landing');
  const time = getGroupVal('fg-time');

  if (!date || !flightNum || !weight || !takeoff || !landing || !time) {
    toast('Fill in all required fields');
    return;
  }

  setServerStatus('syncing');
  try {
    if (editingId !== null) {
      const wingReg = (document.getElementById('f-wing')?.value || '').trim().toUpperCase() || null;
      const res = await api(`/api/flights/${editingId}`, {
        method: 'PUT',
        body: JSON.stringify({ date, flight_num: flightNum, weight, takeoff, landing, time, notes, wing_reg: wingReg })
      });
      if (!res.ok) throw new Error(await res.text());
      toast('Flight updated!');
    } else {
      const wingReg = (document.getElementById('f-wing')?.value || '').trim().toUpperCase() || null;
      if (wingReg && wingReg !== currentWing) currentWing = wingReg;
      const res = await api('/api/flights', {
        method: 'POST',
        body: JSON.stringify({ date, flight_num: flightNum, weight, takeoff, landing, time, notes, wing_reg: wingReg })
      });
      if (!res.ok) throw new Error(await res.text());
      toast('Flight logged! Office notified.');
    }
    resetForm();
    await loadMyData();
    updateFlightNumForDate(document.getElementById('f-date').value);
  } catch (e) {
    toast('Save failed: ' + e.message);
    setServerStatus('offline');
  }
}

function resetForm() {
  editingId = null;
  // Reset peak drive mode
  isPeakDrive = false;
  const btn = document.getElementById('peak-drive-btn');
  if (btn) { btn.style.background = 'var(--surface)'; btn.style.borderColor = 'var(--border)'; btn.style.color = 'var(--muted)'; }
  ['field-weight','field-takeoff','field-landing','field-time','field-wing','field-flightnum'].forEach(id => {
    const el = document.getElementById(id); if (el) { el.style.opacity = ''; el.style.pointerEvents = ''; }
  });
  document.getElementById('card-title').textContent = 'New Flight';
  document.getElementById('save-btn').textContent = 'Save Flight';
  document.getElementById('cancel-btn').style.display = 'none';
  document.getElementById('flight-card').classList.remove('editing');
  document.getElementById('f-weight').value = 72;
  document.getElementById('f-notes').value = '';
  updateWeightDisplay();
  document.querySelector('#fg-time button.selected')?.classList.remove('selected');
  document.querySelector('#fg-time button[data-val="10"]').classList.add('selected');
  const dateEl = document.getElementById('f-date');
  dateEl.value = todayStr();
  const hd3 = document.getElementById('header-date'); if (hd3) hd3.textContent = fmtDate(todayStr());
}

function cancelEdit() {
  resetForm();
  updateFlightNumForDate(document.getElementById('f-date').value);
}

function setServerStatus(status) {
  const badge = document.getElementById('server-badge');
  if (status === 'syncing') {
    badge.textContent = '...'; badge.className = 'server-badge';
  } else if (status === 'synced') {
    badge.textContent = 'Synced'; badge.className = 'server-badge synced';
  } else {
    badge.textContent = 'Offline'; badge.className = 'server-badge offline';
  }
}

function editFlight(id) {
  const f = myFlights.find(fl => fl.id === id);
  if (!f) return;
  editingId = id;
  document.getElementById('f-date').value = f.date;
  const hd4 = document.getElementById('header-date'); if (hd4) hd4.textContent = fmtDate(f.date);
  document.getElementById('f-num-display').textContent = f.flight_num;
  document.getElementById('f-weight').value = f.weight;
  updateWeightDisplay();
  setGroupVal('fg-takeoff', f.takeoff);
  setGroupVal('fg-landing', f.landing);
  setGroupVal('fg-time', String(f.time));
  document.getElementById('f-notes').value = f.notes || '';
  const wingEl = document.getElementById('f-wing');
  if (wingEl) wingEl.value = f.wing_reg || currentWing;
  showPage('log');
  document.getElementById('card-title').textContent = 'Edit Flight';
  document.getElementById('save-btn').textContent = 'Update Flight';
  document.getElementById('cancel-btn').style.display = 'block';
  document.getElementById('flight-card').classList.add('editing');
}

function renderFlights() {
  const flights = myFlights.slice().reverse();
  const el = document.getElementById('flights-list');
  if (flights.length === 0) {
    el.innerHTML = '<div class="empty-state">No flights logged yet</div>';
    return;
  }
  const byDate = {};
  flights.forEach(f => {
    if (!byDate[f.date]) byDate[f.date] = [];
    byDate[f.date].push(f);
  });
  let html = '';
  Object.keys(byDate).sort().reverse().forEach(date => {
    const dayFlights = byDate[date];
    html += `<div class="date-group-header">
      ${fmtDate(date)}
      <span class="duty-badge">${dayFlights.length} flights</span>
    </div>`;
    dayFlights.sort((a,b) => a.flight_num - b.flight_num).forEach(f => {
      html += `<div class="flight-item">
        <div>
          <div style="font-size:14px;font-weight:600">Flight ${f.flight_num} · ${f.weight}kg · ${f.time}min</div>
          <div class="flight-meta">${f.takeoff} → ${f.landing}${f.notes ? ' · '+f.notes : ''}</div>
          ${f.client_name ? `<div class="flight-meta" style="color:#fff">👤 ${f.client_name}</div>` : ''}
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          <button class="btn-edit" onclick="editFlight('${f.id}')">&#9998;</button>
          <button class="btn-danger" onclick="deleteFlight('${f.id}')">✕</button>
        </div>
      </div>`;
    });
  });
  el.innerHTML = html;
  const today = myFlights.filter(f => f.date === todayStr());
  document.getElementById('header-flights-sub').textContent =
    `${myFlights.length} total · ${today.length} today`;
}

async function deleteFlight(id) {
  if (!confirm('Delete this flight? This cannot be undone.')) return;
  try {
    const res = await api(`/api/flights/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    toast('Flight deleted');
    await loadMyData();
    updateFlightNumForDate(document.getElementById('f-date').value);
  } catch (e) {
    toast('Delete failed: ' + e.message);
  }
}

async function deleteDrive(id) {
  if (!confirm('Delete this drive? This cannot be undone.')) return;
  try {
    const res = await api(`/api/drives/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error(await res.text());
    toast('Drive deleted');
    await loadMyData();
    renderStats();
  } catch (e) {
    toast('Delete failed: ' + e.message);
  }
}

async function updateWing(val) {
  const reg = val.trim().toUpperCase();
  currentWing = reg;
  const el = document.getElementById('f-wing');
  if (el) el.value = reg;
  if (!reg) return;
  try {
    await api('/api/pilot/wing', { method: 'PUT', body: JSON.stringify({ wing_reg: reg }) });
  } catch {}
}

function changeStatsMonth(delta) {
  statsMonthOffset = Math.min(0, statsMonthOffset + delta);
  renderStats();
}

function renderStats() {
  const flights = myFlights;
  const drives = myDrives || [];

  // Month navigator
  const now = new Date();
  const viewDate = new Date(now.getFullYear(), now.getMonth() + statsMonthOffset, 1);
  const isCurrentMonth = statsMonthOffset === 0;
  const monthKey = viewDate.toLocaleDateString('en-CA', { timeZone: NZ_TZ }).slice(0, 7);
  const monthLabel = viewDate.toLocaleDateString('en-NZ', { month: 'long', year: 'numeric', timeZone: NZ_TZ });
  const monthEndDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 0);
  const monthStartStr = monthKey + '-01';
  const monthEndStr = monthEndDate.toLocaleDateString('en-CA', { timeZone: NZ_TZ });

  const navHtml = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;padding:10px 14px;background:var(--surface);border-radius:10px;grid-column:1/-1;">
    <button onclick="changeStatsMonth(-1)" style="background:none;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 14px;cursor:pointer;font-size:20px;line-height:1;">‹</button>
    <div style="font-weight:700;font-size:15px;color:var(--accent);">${monthLabel}</div>
    <button onclick="changeStatsMonth(1)" ${isCurrentMonth ? 'disabled' : ''} style="background:none;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 14px;cursor:pointer;font-size:20px;line-height:1;opacity:${isCurrentMonth ? '0.3' : '1'};">›</button>
  </div>`;

  const monthFlights = flights.filter(f => f.date >= monthStartStr && f.date <= monthEndStr);
  const monthDrives  = drives.filter(d => d.date >= monthStartStr && d.date <= monthEndStr);

  const t = todayStr();
  const effectiveEnd = isCurrentMonth ? t : monthEndStr;
  const daysElapsed = Math.max(1, Math.round((new Date(effectiveEnd + 'T12:00:00') - new Date(monthStartStr + 'T12:00:00')) / 86400000) + 1);

  if (flights.length === 0 && drives.length === 0) {
    document.getElementById('stats-grid').innerHTML = `${navHtml}<div class="empty-state" style="grid-column:1/-1">No flights yet</div>`;
    document.getElementById('stats-breakdown').innerHTML = '';
    return;
  }

  const ws = getWeekStart(t);
  const we = getWeekEnd(ws);

  const todayFlights = flights.filter(f => f.date === t);
  const weekFlights  = flights.filter(f => f.date >= ws && f.date <= we);

  const avgWeight = flights.length ? (flights.reduce((sum, f) => sum + Number(f.weight), 0) / flights.length).toFixed(1) : '0';
  const avgPerDay = monthFlights.length ? (monthFlights.length / daysElapsed).toFixed(1) : '0';

  // Total kg + elephant equivalent
  const totalKg = Math.round(flights.reduce((sum, f) => sum + Number(f.weight), 0));
  const elephants = (totalKg / 6000).toFixed(1);

  // Wing stats
  const wingFlights = currentWing ? flights.filter(f => f.wing_reg === currentWing) : [];
  const wingUsed = wingFlights.length;
  const wingRemaining = 1000 - wingUsed;
  const wingPct = Math.min(100, (wingUsed / 1000) * 100);
  const wingBarClass = wingRemaining <= 50 ? 'wing-bar-danger' : wingRemaining <= 100 ? 'wing-bar-warn' : 'wing-bar-ok';

  // Compliance: unique days worked in last 14
  const last14 = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    last14.push(d.toLocaleDateString('en-CA', { timeZone: NZ_TZ }));
  }
  const daysWorked = last14.filter(d => flights.some(f => f.date === d)).length;
  const daysLeft = 14 - daysWorked; // days remaining (need min 2 off)
  const daysRemaining = Math.max(0, daysLeft);
  const compPct = (daysWorked / 14) * 100;
  const compBarClass = daysLeft <= 2 ? 'wing-bar-danger' : daysLeft <= 3 ? 'wing-bar-warn' : daysLeft <= 5 ? 'wing-bar-warn' : 'wing-bar-ok';

  // Site breakdown
  const routeCounts = {};
  flights.forEach(f => { const r = f.takeoff + ' → ' + f.landing; routeCounts[r] = (routeCounts[r] || 0) + 1; });
  const topRoutes = Object.entries(routeCounts).sort((a, b) => b[1] - a[1]).slice(0, 5);

  // Monthly chart — 7 months ending at viewed month
  const months = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(viewDate.getFullYear(), viewDate.getMonth() - i, 1);
    const key = d.toLocaleDateString('en-CA', { timeZone: NZ_TZ }).slice(0, 7);
    const label = d.toLocaleDateString('en-NZ', { month: 'short', timeZone: NZ_TZ });
    const count = flights.filter(f => f.date.startsWith(key)).length;
    months.push({ label, count, active: key === monthKey });
  }
  const maxMonth = Math.max(...months.map(m => m.count), 1);

  document.getElementById('stats-grid').innerHTML = navHtml + `
    <div class="stat-card"><div class="stat-number">${monthFlights.length}</div><div class="stat-label">${isCurrentMonth ? 'This Month' : 'That Month'}</div></div>
    <div class="stat-card"><div class="stat-number">${avgPerDay}</div><div class="stat-label">Avg / Day</div></div>
    ${isCurrentMonth ? `
    <div class="stat-card"><div class="stat-number">${todayFlights.length}</div><div class="stat-label">Today</div></div>
    <div class="stat-card"><div class="stat-number">${weekFlights.length}</div><div class="stat-label">This Week</div></div>` : ''}
    <div class="stat-card"><div class="stat-number">${avgWeight}<span style="font-size:16px;font-weight:500">kg</span></div><div class="stat-label">Avg Pax Weight</div></div>
    <div class="stat-card"><div class="stat-number">${monthDrives.length}</div><div class="stat-label">Drives</div></div>
  `;

  // Wing card
  const wingCard = currentWing ? `
    <div class="card stat-section">
      <div class="stat-section-title">Current Wing · ${currentWing}</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end">
        <div>
          <span style="font-size:32px;font-weight:700;color:${wingRemaining<=50?'#c0392b':wingRemaining<=100?'#c07000':'var(--text)'}">${wingRemaining}</span>
          <span style="font-size:14px;color:var(--muted)"> flights remaining</span>
        </div>
        <div style="text-align:right;font-size:13px;color:var(--muted)">${wingUsed} / 1000</div>
      </div>
      <div class="wing-progress-wrap"><div class="wing-progress-bar ${wingBarClass}" style="width:${wingPct}%"></div></div>
      ${wingRemaining <= 50 ? '<div style="margin-top:8px;font-size:13px;font-weight:600;color:#c0392b">⚠️ Under 50 flights — arrange replacement wing</div>'
        : wingRemaining <= 100 ? '<div style="margin-top:8px;font-size:13px;font-weight:600;color:#c07000">⚡ Under 100 flights remaining</div>' : ''}
    </div>` :
    `<div class="card stat-section" style="color:var(--muted);font-size:13px">No wing set — enter registration in Log tab to track usage.</div>`;

  // Compliance card
  const compCard = `
    <div class="card stat-section">
      <div class="stat-section-title">Working Days — Last 14</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end">
        <div>
          <span style="font-size:32px;font-weight:700">${daysWorked}</span>
          <span style="font-size:14px;color:var(--muted)"> days flown</span>
        </div>
        <div style="text-align:right">
          <span style="font-size:24px;font-weight:700;color:${daysLeft<=2?'#c0392b':daysLeft<=3?'#c05800':daysLeft<=5?'#c07000':'#4a8f1e'}">${daysRemaining}</span>
          <span style="font-size:13px;color:var(--muted)"> days left</span>
        </div>
      </div>
      <div class="wing-progress-wrap"><div class="wing-progress-bar ${compBarClass}" style="width:${compPct}%"></div></div>
      ${daysLeft <= 2 ? '<div style="margin-top:8px;font-size:13px;font-weight:600;color:#c0392b">⛔ Must take a rest day before flying again</div>'
        : daysLeft <= 3 ? '<div style="margin-top:8px;font-size:13px;font-weight:600;color:#c05800">⚠️ Only 1 rest day remaining</div>'
        : daysLeft <= 5 ? '<div style="margin-top:8px;font-size:13px;font-weight:600;color:#c07000">⚡ Getting close — 2 rest days needed in 14</div>' : ''}
    </div>`;

  // Total kg card
  const kgCard = `
    <div class="card stat-section">
      <div class="stat-section-title">Career Passengers</div>
      <div style="font-size:32px;font-weight:700">${totalKg.toLocaleString()}<span style="font-size:16px;font-weight:500">kg</span></div>
      <div style="margin-top:4px;font-size:13px;color:var(--muted)">🐘 ${elephants} African elephants across ${flights.length} flights</div>
    </div>`;

  // Site breakdown card
  const siteCard = topRoutes.length ? `
    <div class="card stat-section">
      <div class="stat-section-title">Top Routes</div>
      <div class="month-chart">
        ${topRoutes.map(([route, cnt]) => `
          <div class="month-row">
            <div style="flex:0 0 90px;font-size:12px;font-weight:500;color:var(--text)">${route}</div>
            <div class="month-bar-wrap"><div class="month-bar" style="width:${(cnt/topRoutes[0][1])*100}%"></div></div>
            <div class="month-count">${cnt}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  // Monthly chart card
  const chartCard = `
    <div class="card stat-section">
      <div class="stat-section-title">Monthly Flights</div>
      <div class="month-chart">
        ${months.map(m => `
          <div class="month-row">
            <div class="month-label" style="${m.active?'color:var(--accent);font-weight:700;':''}">${m.label}</div>
            <div class="month-bar-wrap"><div class="month-bar" style="width:${m.count?(m.count/maxMonth)*100:0}%;${m.active?'background:var(--accent);':''}"></div></div>
            <div class="month-count" style="${m.active?'color:var(--accent);font-weight:700;':''}">${m.count||''}</div>
          </div>`).join('')}
      </div>
    </div>`;

  // Drives card — all drives (not filtered by month, so you can see history)
  const allDrives = drives;
  const drivesCard = allDrives.length ? `
    <div class="card stat-section">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div class="stat-section-title" style="margin-bottom:0;">🚐 Peak Drives</div>
        <div style="font-size:13px;color:var(--accent);font-weight:700;">${allDrives.length} total</div>
      </div>
      ${allDrives.map(d => `
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);">
          <div>
            <div style="font-size:14px;font-weight:600;">${fmtDate(d.date)}</div>
            ${d.notes ? `<div style="font-size:12px;color:var(--muted);margin-top:2px;">${d.notes}</div>` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="font-size:12px;color:var(--warning);font-weight:700;">PEAK</div>
            <button class="btn-danger" onclick="deleteDrive('${d.id}')" style="font-size:11px;padding:4px 8px;">✕</button>
          </div>
        </div>`).join('')}
    </div>` : '';

  document.getElementById('stats-breakdown').innerHTML = wingCard + compCard + kgCard + siteCard + chartCard + drivesCard;
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page-header').forEach(h => h.style.display = 'none');
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  const hdr = document.getElementById('header-'+name);
  if (hdr) hdr.style.display = 'block';
  if (name === 'stats') { statsMonthOffset = 0; renderStats(); }
  if (name === 'ff') renderPilotFF();
}

// ─── Flight Following ─────────────────────────────────────────────────────────
function ffFmtDate(d) {
  return new Date(d + 'T12:00:00').toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' });
}

function buildFFTable(dates, pilots) {
  const today = todayStr();
  let html = `<table class="ff-table"><thead><tr>
    <th class="ff-pilot-name">Pilot</th>
    ${dates.map(d => `<th class="${d === today ? 'ff-today-col' : ''}">${ffFmtDate(d)}</th>`).join('')}
    <th>Days Left</th>
  </tr></thead><tbody>`;

  pilots.forEach(p => {
    const daysLeft = 14 - p.daysWorked;
    const cls = daysLeft <= 2 ? 'ff-limit' : daysLeft <= 3 ? 'ff-warn-hard' : daysLeft <= 5 ? 'ff-warn' : 'ff-ok';
    html += `<tr>
      <td class="ff-pilot-name">${p.name}</td>
      ${dates.map(d => {
        const cnt = p.dayCounts[d];
        return `<td class="${d === today ? 'ff-today-col' : ''}">${cnt ? `<span class="ff-day-val">${cnt}</span>` : ''}</td>`;
      }).join('')}
      <td class="ff-total ${cls}">${daysLeft}</td>
    </tr>`;
  });
  html += `</tbody></table>`;
  return html;
}

async function renderPilotFF() {
  const el = document.getElementById('ff-content');
  el.innerHTML = '<div class="empty-state">Loading…</div>';
  try {
    const res = await api('/api/flight-following');
    if (!res.ok) throw new Error('Failed');
    const data = await res.json();
    el.innerHTML = `<div class="ff-wrap">${buildFFTable(data.dates, data.pilots)}</div>`;
  } catch {
    el.innerHTML = '<div class="empty-state">Could not load flight following data</div>';
  }
}

function renderOfficeFF() {
  const dates = [];
  for (let i = 13; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i);
    dates.push(d.toLocaleDateString('en-CA', { timeZone: NZ_TZ }));
  }
  const ffPilots = [...officePilots].sort((a, b) => a.name.localeCompare(b.name)).map(p => {
    const dayCounts = {};
    let daysWorked = 0;
    dates.forEach(d => {
      const cnt = allFlights.filter(f => f.pilot_id === p.id && f.date === d).length;
      if (cnt > 0) { dayCounts[d] = cnt; daysWorked++; }
    });
    return { id: p.id, name: p.name, dayCounts, daysWorked };
  });
  document.getElementById('office-ff-content').innerHTML = buildFFTable(dates, ffPilots);
}

// ─── Office API ───────────────────────────────────────────────────────────────
function officeApi(path, opts = {}) {
  return fetch(`${API_BASE}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${officeToken}`,
      ...opts.headers
    }
  });
}

// ─── Office Auth ──────────────────────────────────────────────────────────────
function showOfficeDashboard() {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('office-dashboard').style.display = 'block';
  connectWS();
  loadOfficeData().then(() => showOfficeTab('groups'));
}

function officeDoLogout() {
  localStorage.removeItem('gforce_office_token');
  officeToken = null;
  if (ws) { ws.close(); ws = null; }
  clearInterval(timerInterval);
  document.getElementById('office-dashboard').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';

// ─── Office Data ──────────────────────────────────────────────────────────────
async function loadOfficeData() {
  try {
    const [pilotsRes, flightsRes] = await Promise.all([
      officeApi('/api/pilots'),
      officeApi('/api/office/flights')
    ]);
    if (pilotsRes.status === 401) { officeDoLogout(); return; }
    officePilots = await pilotsRes.json();
    allFlights = flightsRes.ok ? await flightsRes.json() : [];
    renderOfficeTab();
    renderTodayTab();
    renderFlightsTab();
    renderGroupsTab();
  } catch (e) {
    toast('Cannot connect to server');
  }
}

// ─── Groups Tab ───────────────────────────────────────────────────────────────
function renderGroupsTab() {
  _groupSelected.clear();
  const el = document.getElementById('groups-panel');
  const now = Date.now();
  const ACTIVE_MS = 3 * 60 * 1000; // signed in = seen in last 3 min
  const isSignedIn = p => p.last_seen && (now - new Date(p.last_seen).getTime()) < ACTIVE_MS;
  const alpha = (a, b) => a.name.localeCompare(b.name);
  const available = officePilots.filter(p => p.status !== 'airborne' && isSignedIn(p)).sort(alpha);
  const airborne = officePilots.filter(p => p.status === 'airborne').sort(alpha);

  let html = `
    <div style="padding:16px 0 8px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div class="section-title" style="margin-top:0;margin-bottom:0;">Send Group Away</div>
        <button onclick="loadOfficeData()" style="background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;padding:4px 10px;cursor:pointer;">↻ Refresh</button>
      </div>
      <div class="card" style="margin-bottom:16px;">
        <div class="field">
          <label>Group Name / Booking</label>
          <input type="text" id="group-name-input" placeholder="e.g. Smith Family or BK-2042" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 12px;font-size:16px;outline:none;" />
        </div>
        <div class="field">
          <label>Select Pilots</label>
          <div id="group-pilot-checkboxes" style="display:flex;flex-direction:column;gap:8px;">`;

  if (available.length === 0) {
    html += `<div style="color:var(--muted);font-size:14px;">No pilots signed in and available</div>`;
  } else {
    available.forEach(p => {
      html += `
        <div style="display:flex;align-items:center;gap:12px;padding:12px;background:var(--surface);border-radius:8px;cursor:pointer;border:2px solid transparent;" id="grp-row-${p.id}" onclick="toggleGroupPilot('${p.id}')">
          <div style="width:22px;height:22px;border-radius:5px;border:2px solid var(--accent);background:var(--card);display:flex;align-items:center;justify-content:center;flex-shrink:0;" id="grp-chk-${p.id}">
            <span id="grp-tick-${p.id}" style="display:none;color:var(--accent);font-size:16px;line-height:1;">✓</span>
          </div>
          <span style="font-size:15px;font-weight:500;">${p.name}</span>
        </div>`;
    });
  }

  html += `
        </div>
      </div>
      <button onclick="submitGroupAway()" style="width:100%;padding:14px;background:var(--accent);border:none;border-radius:9999px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:Montserrat,sans-serif;text-transform:uppercase;letter-spacing:1px;">Send Group Away</button>
    </div>`;

  if (airborne.length > 0) {
    html += `<div class="section-title" style="margin-top:24px;">Currently Airborne Groups</div>`;
    // Group airborne pilots by group_id
    const grouped = {};
    const ungrouped = [];
    airborne.forEach(p => {
      if (p.group_id) {
        if (!grouped[p.group_id]) grouped[p.group_id] = { name: p.client_name || p.group_id, pilots: [] };
        grouped[p.group_id].pilots.push(p);
      } else {
        ungrouped.push(p);
      }
    });
    Object.values(grouped).forEach(g => {
      html += `<div class="card" style="border-color:var(--warning);margin-bottom:10px;">
        <div style="font-weight:700;color:var(--accent);margin-bottom:8px;">📋 ${g.name}</div>
        <div style="color:#ccc;font-size:14px;">${g.pilots.map(p => p.name).join(', ')}</div>
      </div>`;
    });
  }

  el.innerHTML = html;

const _groupSelected = new Set();

function toggleGroupPilot(id) {
  const row = document.getElementById('grp-row-' + id);
  const tick = document.getElementById('grp-tick-' + id);
  const chk  = document.getElementById('grp-chk-'  + id);
  if (!row) return;
  if (_groupSelected.has(id)) {
    _groupSelected.delete(id);
    tick.style.display = 'none';
    row.style.borderColor = 'transparent';
    chk.style.background = 'var(--card)';
    tick.style.color = 'var(--accent)';
  } else {
    _groupSelected.add(id);
    tick.style.display = 'block';
    row.style.borderColor = 'var(--accent)';
    chk.style.background = 'var(--accent)';
    tick.style.color = '#000';
  }
}

async function submitGroupAway() {
  const name = document.getElementById('group-name-input').value.trim();
  if (!name) { toast('Enter a group name or booking number'); return; }
  if (_groupSelected.size === 0) { toast('Select at least one pilot'); return; }
  const now = Date.now();
  const ACTIVE_MS = 3 * 60 * 1000;
  const isSignedIn = p => p.last_seen && (now - new Date(p.last_seen).getTime()) < ACTIVE_MS;
  const available = officePilots.filter(p => p.status !== 'airborne' && isSignedIn(p));
  const pilot_ids = available.filter(p => _groupSelected.has(p.id)).map(p => p.id);
  const pilot_names = available.filter(p => _groupSelected.has(p.id)).map(p => p.name);
  try {
    const res = await officeApi('/api/office/group-leave', {
      method: 'POST',
      body: JSON.stringify({ group_name: name, pilot_ids })
    });
    const data = await res.json();
    if (res.ok) {
      toast(`Group "${name}" away — ${pilot_names.join(', ')}`);
      document.getElementById('group-name-input').value = '';
      _groupSelected.clear();
      await loadOfficeData();
      renderGroupsTab();
    } else {
      toast('Error: ' + (data.error || 'Failed'));
    }
  } catch (e) { toast('Error: ' + e.message); }
}

// ─── Office Tab ───────────────────────────────────────────────────────────────
function renderOfficeTab() {
  const el = document.getElementById('pilots-list');
  const now = Date.now();
  const ACTIVE_MS = 2 * 60 * 1000; // 2 minutes — pilot app polls every 15s

  const isSignedIn = p => p.last_seen && (now - new Date(p.last_seen).getTime()) < ACTIVE_MS;
  const alpha = (a, b) => a.name.localeCompare(b.name);

  const flying    = officePilots.filter(p => p.status === 'airborne').sort(alpha);
  const signedIn  = officePilots.filter(p => p.status !== 'airborne' && isSignedIn(p)).sort(alpha);
  const signedOut = officePilots.filter(p => p.status !== 'airborne' && !isSignedIn(p)).sort(alpha);

  function pilotCard(p, disabled = false) {
    const isAirborne = p.status === 'airborne';
    const clientName = p.client_name || '';
    const initial = p.name.charAt(0).toUpperCase();
    return `<div class="pilot-card ${isAirborne ? 'airborne' : ''}" id="pilot-card-${p.id}">
      <div class="pilot-card-top">
        <div class="pilot-avatar">${initial}</div>
        <div class="pilot-info">
          <div class="pilot-name">${p.name}</div>
          <div class="pilot-status ${isAirborne ? 'airborne' : 'in-office'}">
            ${isAirborne ? '🪂 Away' : '🏢 In office'}
            ${!isAirborne && p.last_landed_at ? ' · Last landed ' + fmtRelative(p.last_landed_at) : ''}
          </div>
          ${isAirborne && clientName ? `<div class="pilot-client">👤 ${clientName}</div>` : ''}
        </div>
        ${!disabled ? `<div class="pilot-actions">
          ${isAirborne
            ? `<button class="btn-landed" style="cursor:default;opacity:1;background:var(--warning);color:#292f36;">🪂 Flying</button>
               <button class="btn-danger" onclick="confirmLandedEarly('${p.id}', '${p.name}')">Cancel</button>`
            : `<button class="btn-leave" onclick="doLeaveOffice('${p.id}')">Away</button>`
          }
        </div>` : ''}
      </div>
      ${isAirborne && p.timer_expires_at ? `<div class="timer-display" id="timer-${p.id}" data-expires="${p.timer_expires_at}">Timer: --:--</div>` : ''}
      <div class="pilot-client-row">
        <label>Client / Booking:</label>
        <input type="text" id="client-${p.id}" value="${clientName}"
          placeholder="e.g. Jan Kowalski or BKG-1234"
          ${disabled ? 'disabled style="opacity:0.4;cursor:not-allowed"' : ''}
          ${isAirborne && !disabled ? `onchange="updateClientName('${p.id}', this.value)"` : ''} />
      </div>
    </div>`;
  }

  function section(label, pilots, disabled = false) {
    if (pilots.length === 0) return `<div class="section-title">${label} <span style="color:var(--border);font-weight:400">— none</span></div>`;
    return `<div class="section-title">${label}</div>` + pilots.map(p => pilotCard(p, disabled)).join('');
  }

  el.innerHTML =
    section('🪂 Flying', flying) +
    section('🟢 Signed In', signedIn) +
    section('⚫ Signed Out', signedOut, true);

  updateTimers();
}

async function doLeaveOffice(pilotId) {
  const clientName = document.getElementById(`client-${pilotId}`)?.value || '';
  const res = await officeApi('/api/office/leave', {
    method: 'POST',
    body: JSON.stringify({ pilot_id: pilotId, client_name: clientName })

  if (res.ok) { toast(data.message); await loadOfficeData(); }
  else { toast(data.error || 'Error'); }
}

function confirmLandedEarly(pilotId, pilotName) {
  if (!confirm(`Cancel timer for ${pilotName}? This will mark them as back in office.`)) return;
  doLandedEarly(pilotId);
}

async function doLandedEarly(pilotId) {
  const res = await officeApi('/api/office/landed-early', {
    method: 'POST',
    body: JSON.stringify({ pilot_id: pilotId })
  });
  const data = await res.json();
  if (res.ok) { toast(data.message); await loadOfficeData(); }
  else { toast(data.error || 'Error'); }
}

async function updateClientName(pilotId, clientName) {
  await officeApi('/api/office/leave', {
    method: 'POST',
