<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Gforce Staff Dashboard</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --card: #222;
      --border: #333;
      --accent: #4fc3f7;
      --accent2: #81c784;
      --danger: #ef5350;
      --warning: #ffb74d;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* LOGIN */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    #login-screen h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    #login-screen p { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
    .login-form {
      width: 100%;
      max-width: 360px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .login-form input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
    }
    .login-form input:focus { border-color: var(--accent); }
    .login-form button {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #000;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    #login-error { color: var(--danger); font-size: 13px; margin-top: 10px; text-align: center; display: none; }

    /* DASHBOARD */
    #dashboard { display: none; }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .ws-indicator {
      width: 10px; height: 10px; border-radius: 50%; background: var(--danger);
    }
    .ws-indicator.connected { background: var(--accent2); }
    .logout-btn {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-size: 13px; padding: 6px 12px; cursor: pointer;
    }

    /* TABS */
    .tab-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      flex: 1; padding: 12px; background: none; border: none;
      color: var(--muted); font-size: 14px; font-weight: 600;
      cursor: pointer; border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ALERT BANNER */
    #alert-banner {
      display: none;
      background: var(--danger);
      color: #fff;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
    #alert-banner.show { display: block; }

    /* CONTENT */
    .content { padding: 20px; max-width: 900px; margin: 0 auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* PILOT GRID (Office Tab) */
    .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; margin-top: 20px; }
    .section-title:first-child { margin-top: 0; }

    .pilot-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .pilot-card.airborne { border-color: var(--warning); }
    .pilot-card.alert { border-color: var(--danger); }

    .pilot-card-top {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }
    .pilot-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 700; color: var(--accent); flex-shrink: 0;
    }
    .pilot-info { flex: 1; min-width: 0; }
    .pilot-name { font-size: 16px; font-weight: 600; }
    .pilot-status { font-size: 13px; margin-top: 2px; }
    .pilot-status.in-office { color: var(--accent2); }
    .pilot-status.airborne { color: var(--warning); }
    .pilot-client { font-size: 13px; color: var(--accent); margin-top: 2px; font-weight: 600; }

    .timer-display {
      font-size: 14px; font-weight: 700; font-variant-numeric: tabular-nums;
      color: var(--warning); margin-bottom: 10px;
    }
    .timer-display.urgent { color: var(--danger); }

    .pilot-client-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .pilot-client-row label { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .pilot-client-row input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 7px 10px;
      font-size: 14px; outline: none;
    }
    .pilot-client-row input:focus { border-color: var(--accent); }

    .pilot-actions { display: flex; gap: 8px; }
    .btn-leave {
      padding: 8px 14px; background: var(--warning); border: none;
      border-radius: 8px; color: #000; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-landed {
      padding: 8px 14px; background: var(--accent2); border: none;
      border-radius: 8px; color: #000; font-size: 13px; font-weight: 700; cursor: pointer;
    }

    /* FLIGHTS TAB */
    .flight-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    .flight-table th {
      text-align: left; padding: 8px 10px; background: var(--surface);
      color: var(--muted); font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.5px; border-bottom: 1px solid var(--border);
    }
    .flight-table td {
      padding: 10px 10px; border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .flight-table tr:last-child td { border-bottom: none; }
    .flight-table .pilot-col { font-weight: 600; color: var(--accent); }
    .flight-table .client-col { color: var(--accent2); font-size: 12px; }
    .flight-table .time-col { color: var(--muted); font-size: 12px; }
    .flight-table .badge {
      display: inline-block; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 2px 8px; font-size: 11px; color: var(--text);
    }

    .export-bar {
      display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
    }
    .btn-export-all {
      padding: 8px 16px; background: var(--accent); border: none;
      border-radius: 8px; color: #000; font-size: 13px; font-weight: 700; cursor: pointer;
    }
    .btn-export-pilot {
      padding: 8px 14px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 13px; cursor: pointer;
    }
    .btn-export-pilot:hover { border-color: var(--accent); color: var(--accent); }

    /* TOAST */
    #toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; opacity: 0;
      pointer-events: none; transition: opacity 0.3s; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    .hidden { display: none !important; }
    .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 15px; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>Gforce Office</h1>
  <p>Staff Dashboard</p>
  <div class="login-form">
    <input type="password" id="office-password" placeholder="Office password" onkeydown="if(event.key==='Enter')doLogin()" />
    <button onclick="doLogin()">Sign In</button>
    <div id="login-error">Incorrect password</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="header">
    <h1>Gforce Office</h1>
    <div class="header-right">
      <div class="ws-indicator" id="ws-indicator" title="Connection status"></div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div id="alert-banner">
    ⚠️ PILOT TIMER EXPIRED — <span id="alert-pilot-name"></span> has not reported landing!
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('office')" id="tab-office-btn">Office</button>
    <button class="tab-btn" onclick="showTab('flights')" id="tab-flights-btn">Flights</button>
  </div>

  <div class="content">
    <!-- OFFICE TAB -->
    <div class="tab-content active" id="tab-office">
      <div class="section-title">Pilots</div>
      <div id="pilots-list"></div>
    </div>

    <!-- FLIGHTS TAB -->
    <div class="tab-content" id="tab-flights">
      <div class="section-title" style="margin-top:0">All Flights</div>
      <div class="export-bar">
        <button class="btn-export-all" onclick="exportAllCSV()">Export All CSV</button>
        <div id="pilot-export-btns"></div>
      </div>
      <div id="flights-table-container"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const API_BASE = 'https://gforce-api-6jpm.onrender.com';

let token = localStorage.getItem('gforce_office_token');
let ws = null;
let pilots = [];
let allFlights = [];
let timers = {}; // pilot_id -> { client_name, started_at, expires_at }
let alertDismissed = new Set();

// ─── Auth ─────────────────────────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('office-password').value;
  document.getElementById('login-error').style.display = 'none';
  fetch(`${API_BASE}/api/auth/office`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  }).then(r => r.json()).then(data => {
    if (data.token) {
      token = data.token;
      localStorage.setItem('gforce_office_token', token);
      showDashboard();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }).catch(() => {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent = 'Cannot connect to server';
  });
}

function doLogout() {
  localStorage.removeItem('gforce_office_token');
  token = null;
  if (ws) { ws.close(); ws = null; }
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadData();
  connectWS();
}

if (token) showDashboard();

// ─── API ──────────────────────────────────────────────────────────────────────
function api(path, opts = {}) {
  return fetch(`${API_BASE}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...opts.headers
    }
  });
}

async function loadData() {
  try {
    const [pilotsRes, flightsRes] = await Promise.all([
      api('/api/pilots'),
      api('/api/office/flights')
    ]);
    if (pilotsRes.status === 401) { doLogout(); return; }
    pilots = await pilotsRes.json();
    allFlights = flightsRes.ok ? await flightsRes.json() : [];
    renderOfficeTab();
    renderFlightsTab();
  } catch (e) {
    toast('Cannot connect to server');
  }
}

// ─── Office Tab ────────────────────────────────────────────────────────────────
function renderOfficeTab() {
  const el = document.getElementById('pilots-list');

  el.innerHTML = pilots.map(p => {
    const isAirborne = p.status === 'airborne';
    const timerExpiry = p.timer_expires_at;
    const clientName = p.client_name || '';
    const initial = p.name.charAt(0).toUpperCase();

    return `<div class="pilot-card ${isAirborne ? 'airborne' : ''}" id="pilot-card-${p.id}">
      <div class="pilot-card-top">
        <div class="pilot-avatar">${initial}</div>
        <div class="pilot-info">
          <div class="pilot-name">${p.name}</div>
          <div class="pilot-status ${isAirborne ? 'airborne' : 'in-office'}">
            ${isAirborne ? '🚐 Left office' : '🏢 In office'}
            ${p.last_landed_at ? ' · Last landed ' + fmtRelative(p.last_landed_at) : ''}
          </div>
          ${isAirborne && clientName ? `<div class="pilot-client">👤 ${clientName}</div>` : ''}
        </div>
        <div class="pilot-actions">
          ${isAirborne
            ? `<button class="btn-landed" onclick="doLandedEarly('${p.id}')">Landed</button>`
            : `<button class="btn-leave" onclick="doLeaveOffice('${p.id}')">Left Office</button>`
          }
        </div>
      </div>
      ${isAirborne && timerExpiry ? `<div class="timer-display" id="timer-${p.id}" data-expires="${timerExpiry}">Timer: --:--</div>` : ''}
      ${isAirborne ? `<div class="pilot-client-row">
        <label>Client / Booking:</label>
        <input type="text" id="client-${p.id}" value="${clientName}" placeholder="e.g. Jan Kowalski or BKG-1234"
          onchange="updateClientName('${p.id}', this.value)" />
      </div>` : ''}
    </div>`;
  }).join('');

  updateTimers();
}

async function doLeaveOffice(pilotId) {
  const clientName = document.getElementById(`client-${pilotId}`)?.value || '';
  const res = await api('/api/office/leave', {
    method: 'POST',
    body: JSON.stringify({ pilot_id: pilotId, client_name: clientName })
  });
  const data = await res.json();
  if (res.ok) {
    toast(data.message);
    await loadData();
  } else {
    toast(data.error || 'Error');
  }
}

async function doLandedEarly(pilotId) {
  const res = await api('/api/office/landed-early', {
    method: 'POST',
    body: JSON.stringify({ pilot_id: pilotId })
  });
  const data = await res.json();
  if (res.ok) {
    toast(data.message);
    await loadData();
  } else {
    toast(data.error || 'Error');
  }
}

async function updateClientName(pilotId, clientName) {
  // Update via leave again with same pilot to update client_name
  await api('/api/office/leave', {
    method: 'POST',
    body: JSON.stringify({ pilot_id: pilotId, client_name: clientName })
  });
}

// ─── Flights Tab ──────────────────────────────────────────────────────────────
function renderFlightsTab() {
  // Export buttons
  document.getElementById('pilot-export-btns').innerHTML = pilots.map(p =>
    `<button class="btn-export-pilot" onclick="exportPilotCSV('${p.id}')">${p.name}</button>`
  ).join('');

  const el = document.getElementById('flights-table-container');
  if (allFlights.length === 0) {
    el.innerHTML = '<div class="empty-state">No flights logged yet</div>';
    return;
  }

  // Group by date
  const byDate = {};
  allFlights.forEach(f => {
    if (!byDate[f.date]) byDate[f.date] = [];
    byDate[f.date].push(f);
  });

  let html = `<table class="flight-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Pilot</th>
        <th>Client</th>
        <th>#</th>
        <th>Weight</th>
        <th>Site</th>
        <th>Time</th>
        <th>Photos</th>
        <th>Notes</th>
      </tr>
    </thead>
    <tbody>`;

  Object.keys(byDate).sort().reverse().forEach(date => {
    byDate[date].forEach(f => {
      html += `<tr>
        <td>${fmtDate(date)}</td>
        <td class="pilot-col">${f.pilot_name}</td>
        <td class="client-col">${f.client_name || '—'}</td>
        <td>${f.flight_num}</td>
        <td>${f.weight}kg</td>
        <td>${f.takeoff} → ${f.landing}</td>
        <td>${f.time}min</td>
        <td>${f.photos > 0 ? '$' + f.photos : '—'}</td>
        <td class="time-col">${f.notes || ''}</td>
      </tr>`;
    });
  });

  html += '</tbody></table>';
  el.innerHTML = html;
}

function fmtDate(s) {
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' });
}

async function exportAllCSV() {
  downloadCSV(buildCSV(allFlights), 'gforce_flights_all.csv');
}

async function exportPilotCSV(pilotId) {
  const pilot = pilots.find(p => p.id === pilotId);
  const pilotFlights = allFlights.filter(f => f.pilot_id === pilotId);
  downloadCSV(buildCSV(pilotFlights), `gforce_flights_${pilot?.name || pilotId}.csv`);
}

function buildCSV(flights) {
  const header = ['Date', 'Pilot', 'Client Name', 'Flight #', 'Weight (kg)', 'Takeoff', 'Landing', 'Time (min)', 'Photos ($)', 'Notes'];
  const rows = flights.map(f => [
    f.date, f.pilot_name || '', f.client_name || '', f.flight_num, f.weight,
    f.takeoff, f.landing, f.time, f.photos || 0, f.notes || ''
  ]);
  return [header, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
}

function downloadCSV(csv, filename) {
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  toast('Downloading...');
}

// ─── Timers ───────────────────────────────────────────────────────────────────
let timerInterval;
function updateTimers() {
  clearInterval(timerInterval);
  function tick() {
    const now = Date.now();
    pilots.forEach(p => {
      if (p.status !== 'airborne' || !p.timer_expires_at) return;
      const expires = new Date(p.timer_expires_at).getTime();
      const remaining = expires - now;
      const el = document.getElementById(`timer-${p.id}`);
      if (!el) return;

      if (remaining <= 0) {
        el.textContent = 'EXPIRED';
        el.classList.add('urgent');
        const card = document.getElementById(`pilot-card-${p.id}`);
        if (card) { card.classList.add('alert'); card.classList.remove('airborne'); }
        showAlert(p.name);
      } else {
        const mins = Math.floor(remaining / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        el.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')} remaining`;
        el.classList.toggle('urgent', remaining < 600000);
      }
    });
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

function showAlert(pilotName) {
  if (alertDismissed.has(pilotName)) return;
  document.getElementById('alert-pilot-name').textContent = pilotName;
  document.getElementById('alert-banner').classList.add('show');
  setTimeout(() => dismissAlert(pilotName), 30000);
}

function dismissAlert(pilotName) {
  alertDismissed.add(pilotName);
  document.getElementById('alert-banner').classList.remove('show');
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function showTab(name) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  document.getElementById(`tab-${name}-btn`).classList.add('active');
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  const wsUrl = `wss://gforce-api-6jpm.onrender.com`;
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    document.getElementById('ws-indicator').classList.add('connected');
    document.getElementById('ws-indicator').title = 'Connected';
  };
  ws.onclose = () => {
    document.getElementById('ws-indicator').classList.remove('connected');
    document.getElementById('ws-indicator').title = 'Disconnected';
    setTimeout(connectWS, 5000);
  };
  ws.onerror = () => ws.close();

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    switch (data.type) {
      case 'LEFT_OFFICE':
        toast(`${data.pilot_name} left office`);
        loadData();
        break;
      case 'LANDED':
      case 'LANDED_EARLY':
        toast(`${data.pilot_name} landed!`);
        dismissAlert(data.pilot_name);
        loadData();
        break;
      case 'TIMER_EXPIRED':
        toast(`⚠️ Timer expired for ${data.pilot_name}!`);
        loadData();
        break;
    }
  };
}

// ─── Utils ───────────────────────────────────────────────────────────────────
function fmtRelative(isoString) {
  const d = new Date(isoString);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return d.toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' });
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
