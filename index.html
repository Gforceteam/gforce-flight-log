<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Gforce Staff Dashboard</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --card: #222;
      --border: #333;
      --accent: #4fc3f7;
      --accent2: #81c784;
      --danger: #ef5350;
      --warning: #ffb74d;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* LOGIN */
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    #login-screen h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; }
    #login-screen p { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
    .login-form {
      width: 100%;
      max-width: 360px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .login-form input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
    }
    .login-form input:focus { border-color: var(--accent); }
    .login-form button {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #000;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    #login-error { color: var(--danger); font-size: 13px; margin-top: 10px; text-align: center; display: none; }

    /* DASHBOARD */
    #dashboard { display: none; }

    /* HEADER */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .ws-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
    }
    .ws-indicator.connected { background: var(--accent2); }
    .logout-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      padding: 6px 12px;
      cursor: pointer;
    }

    /* ALERT BANNER */
    #alert-banner {
      display: none;
      background: var(--danger);
      color: #fff;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      animation: pulse 1s infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.7; } }
    #alert-banner.show { display: block; }

    /* PILOT GRID */
    .content { padding: 20px; max-width: 900px; margin: 0 auto; }
    .section-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px; margin-top: 24px; }
    .section-title:first-child { margin-top: 0; }

    .pilot-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .pilot-card.airborne { border-color: var(--warning); }
    .pilot-card.alert { border-color: var(--danger); }

    .pilot-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      flex-shrink: 0;
    }
    .pilot-info { flex: 1; min-width: 0; }
    .pilot-name { font-size: 17px; font-weight: 600; }
    .pilot-status { font-size: 13px; margin-top: 2px; }
    .pilot-status.in-office { color: var(--accent2); }
    .pilot-status.airborne { color: var(--warning); }
    .pilot-status.expired { color: var(--danger); font-weight: 700; }

    .timer-display {
      font-size: 15px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--warning);
      white-space: nowrap;
    }
    .timer-display.urgent { color: var(--danger); }

    .pilot-actions { display: flex; gap: 8px; flex-shrink: 0; }
    .btn-leave {
      padding: 8px 14px;
      background: var(--warning);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-landed {
      padding: 8px 14px;
      background: var(--accent2);
      border: none;
      border-radius: 8px;
      color: #000;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn-disabled {
      padding: 8px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      cursor: default;
    }

    /* EXPORT SECTION */
    .export-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 10px;
    }
    .export-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .export-row:last-child { border-bottom: none; }
    .export-name { font-size: 14px; font-weight: 600; }
    .btn-export {
      padding: 6px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 12px;
      cursor: pointer;
    }
    .btn-export:hover { border-color: var(--accent); color: var(--accent); }
    .btn-export.all { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
    .btn-export.all:hover { opacity: 0.85; }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>Gforce Office</h1>
  <p>Staff Dashboard</p>
  <div class="login-form">
    <input type="password" id="office-password" placeholder="Office password" onkeydown="if(event.key==='Enter')doLogin()" />
    <button onclick="doLogin()">Sign In</button>
    <div id="login-error">Incorrect password</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="header">
    <h1>Gforce Office</h1>
    <div class="header-right">
      <div class="ws-indicator" id="ws-indicator" title="Connection status"></div>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div id="alert-banner">
    ⚠️ PILOT TIMER EXPIRED — <span id="alert-pilot-name"></span> has not reported landing!
  </div>

  <div class="content">
    <div class="section-title">Pilots</div>
    <div id="pilots-list"></div>

    <div class="section-title">Export Data</div>
    <div class="export-card">
      <div class="export-row">
        <span class="export-name">All Pilots (Combined)</span>
        <button class="btn-export all" onclick="exportCSV(null)">CSV</button>
      </div>
      <div id="export-list"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
// For local development use localhost:3000, for production use your deployed URL
const API_BASE = window.location.hostname === 'localhost'
  ? 'http://localhost:3000'
  : 'https://gforce-api-6jpm.onrender.com';

let token = localStorage.getItem('gforce_office_token');
let ws = null;
let pilots = [];
let timers = {}; // pilot_id -> { started_at, expires_at }
let alertDismissed = new Set();

// ─── Auth ─────────────────────────────────────────────────────────────────────
function doLogin() {
  const pw = document.getElementById('office-password').value;
  fetch(`${API_BASE}/api/auth/office`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  }).then(r => r.json()).then(data => {
    if (data.token) {
      token = data.token;
      localStorage.setItem('gforce_office_token', token);
      showDashboard();
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  }).catch(() => {
    document.getElementById('login-error').style.display = 'block';
    document.getElementById('login-error').textContent = 'Cannot connect to server';
  });
}

function doLogout() {
  localStorage.removeItem('gforce_office_token');
  token = null;
  if (ws) { ws.close(); ws = null; }
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

// ─── Dashboard Init ───────────────────────────────────────────────────────────
function showDashboard() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadPilots();
  connectWS();
}

if (token) {
  showDashboard();
}

// ─── API ──────────────────────────────────────────────────────────────────────
function api(path, opts = {}) {
  return fetch(`${API_BASE}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...opts.headers
    }
  });
}

async function loadPilots() {
  try {
    const res = await api('/api/pilots');
    if (res.status === 401) { doLogout(); return; }
    pilots = await res.json();
    renderPilots();
    renderExportList();
  } catch (e) {
    toast('Cannot connect to server');
  }
}

async function doLeaveOffice(pilotId) {
  const res = await api('/api/office/leave', {
    method: 'POST',
    body: JSON.stringify({ pilot_id: pilotId })
  });
  const data = await res.json();
  if (res.ok) {
    toast(data.message);
    await loadPilots();
  } else {
    toast(data.error || 'Error');
  }
}

async function doLandedEarly(pilotId) {
  const res = await api('/api/office/landed-early', {
    method: 'POST',
    body: JSON.stringify({ pilot_id: pilotId })
  });
  const data = await res.json();
  if (res.ok) {
    toast(data.message);
    await loadPilots();
  } else {
    toast(data.error || 'Error');
  }
}

async function exportCSV(pilotId) {
  const url = `${API_BASE}/api/export/flights${pilotId ? `?pilot_id=${pilotId}` : ''}`;
  const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
  if (!res.ok) { toast('Export failed'); return; }
  const blob = await res.blob();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `gforce_flights${pilotId ? '_' + pilotId : '_all'}.csv`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  toast('Downloading...');
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderPilots() {
  const el = document.getElementById('pilots-list');
  if (pilots.length === 0) {
    el.innerHTML = '<div style="color:var(--muted);font-size:14px;padding:20px 0">No pilots configured</div>';
    return;
  }

  el.innerHTML = pilots.map(p => {
    const isAirborne = p.status === 'airborne';
    const timerExpiry = p.timer_expires_at;
    const initial = p.name.charAt(0).toUpperCase();

    return `<div class="pilot-card ${isAirborne ? 'airborne' : ''}" id="pilot-${p.id}">
      <div class="pilot-avatar">${initial}</div>
      <div class="pilot-info">
        <div class="pilot-name">${p.name}</div>
        <div class="pilot-status ${isAirborne ? 'airborne' : 'in-office'}">
          ${isAirborne ? '🚐 Left office' : '🏢 In office'}
          ${p.last_landed_at ? ' · Last landed ' + fmtRelative(p.last_landed_at) : ''}
        </div>
        ${isAirborne && timerExpiry ? `<div class="timer-display" id="timer-${p.id}" data-expires="${timerExpiry}">Timer: --:--</div>` : ''}
      </div>
      <div class="pilot-actions">
        ${isAirborne
          ? `<button class="btn-landed" onclick="doLandedEarly('${p.id}')">Landed</button>`
          : `<button class="btn-leave" onclick="doLeaveOffice('${p.id}')">Left Office</button>`
        }
      </div>
    </div>`;
  }).join('');

  // Start timer updates
  if (isAirborne) updateTimers();
}

function renderExportList() {
  const el = document.getElementById('export-list');
  el.innerHTML = pilots.map(p =>
    `<div class="export-row">
      <span class="export-name">${p.name}</span>
      <button class="btn-export" onclick="exportCSV('${p.id}')">CSV</button>
    </div>`
  ).join('');
}

// ─── Timers ───────────────────────────────────────────────────────────────────
let timerInterval;
function updateTimers() {
  clearInterval(timerInterval);
  function tick() {
    const now = Date.now();
    let hasUrgent = false;
    pilots.forEach(p => {
      if (p.status !== 'airborne' || !p.timer_expires_at) return;
      const expires = new Date(p.timer_expires_at).getTime();
      const remaining = expires - now;
      const el = document.getElementById(`timer-${p.id}`);
      if (!el) return;

      if (remaining <= 0) {
        el.textContent = 'EXPIRED';
        el.classList.add('urgent');
        const card = document.getElementById(`pilot-${p.id}`);
        if (card) card.classList.add('alert');
        showAlert(p.name);
        hasUrgent = true;
      } else {
        const mins = Math.floor(remaining / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        el.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        if (remaining < 600000) el.classList.add('urgent'); // 10 min warning
      }
    });
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

function showAlert(pilotName) {
  if (alertDismissed.has(pilotName)) return;
  document.getElementById('alert-pilot-name').textContent = pilotName;
  document.getElementById('alert-banner').classList.add('show');
  // Auto-dismiss after 30s
  setTimeout(() => dismissAlert(pilotName), 30000);
}

function dismissAlert(pilotName) {
  alertDismissed.add(pilotName);
  document.getElementById('alert-banner').classList.remove('show');
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  const wsUrl = (API_BASE.startsWith('https') ? 'wss://' : 'ws://') + API_BASE.replace(/^https?:\/\//, '');
  ws = new WebSocket(wsUrl);

  ws.onopen = () => {
    document.getElementById('ws-indicator').classList.add('connected');
    document.getElementById('ws-indicator').title = 'Connected';
  };
  ws.onclose = () => {
    document.getElementById('ws-indicator').classList.remove('connected');
    document.getElementById('ws-indicator').title = 'Disconnected';
    // Reconnect after 5s
    setTimeout(connectWS, 5000);
  };
  ws.onerror = () => ws.close();

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    handleWS(data);
  };
}

function handleWS(data) {
  switch (data.type) {
    case 'LEFT_OFFICE':
      toast(`${data.pilot_name} left office`);
      loadPilots();
      break;
    case 'LANDED':
    case 'LANDED_EARLY':
      toast(`${data.pilot_name} landed!`);
      dismissAlert(data.pilot_name);
      loadPilots();
      break;
    case 'TIMER_EXPIRED':
      toast(`⚠️ Timer expired for ${data.pilot_name}!`);
      loadPilots();
      break;
  }
}

// ─── Utils ───────────────────────────────────────────────────────────────────
function fmtRelative(isoString) {
  const d = new Date(isoString);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return d.toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' });
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
</body>
</html>
