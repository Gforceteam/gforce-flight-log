  });
}

// ─── Today Tab ────────────────────────────────────────────────────────────────
function renderTodayTab() {
  const today = todayStr();
  const todayFlights = allFlights.filter(f => f.date === today);

  const sorted = [...todayFlights];
  const dir = todaySort.dir === 'asc' ? 1 : -1;
  if (todaySort.col === 'pilot') {
    sorted.sort((a, b) => dir * (a.pilot_name || '').localeCompare(b.pilot_name || ''));
  } else if (todaySort.col === 'client') {
    sorted.sort((a, b) => dir * (a.client_name || '').localeCompare(b.client_name || ''));
  } else {
    sorted.sort((a, b) => dir * (a.landed_at || '').localeCompare(b.landed_at || ''));
  }

  const summary = document.getElementById('today-summary');
  summary.textContent = sorted.length === 0 ? '' : `${sorted.length} flight${sorted.length !== 1 ? 's' : ''} logged today`;

  const el = document.getElementById('office-today-list');
  if (sorted.length === 0) {
    el.innerHTML = '<div class="empty-state">No flights logged today yet</div>';
    return;
  }

  const arrow = (col) => todaySort.col === col ? ` <span class="sort-arrow">${todaySort.dir === 'asc' ? '▲' : '▼'}</span>` : '';

  let html = `<table class="today-table">
    <thead><tr>
      <th class="sortable sort-${todaySort.col === 'time' ? 'active' : 'inactive'}" onclick="sortToday('time')">Time${arrow('time')}</th>
      <th class="sortable sort-${todaySort.col === 'pilot' ? 'active' : 'inactive'}" onclick="sortToday('pilot')">Pilot${arrow('pilot')}</th>
      <th class="sortable sort-${todaySort.col === 'client' ? 'active' : 'inactive'}" onclick="sortToday('client')">Client${arrow('client')}</th>
      <th>#</th>
      <th>Weight</th>
      <th>Site</th>
      <th>Min</th>
    </tr></thead>
    <tbody>`;

  sorted.forEach(f => {
    const timeStr = f.landed_at
      ? new Date(f.landed_at).toLocaleTimeString('en-NZ', { hour: 'numeric', minute: '2-digit' })
      : '—';
    html += `<tr>
      <td class="col-time">${timeStr}</td>
      <td class="col-pilot">${f.pilot_name}</td>
      <td>${f.client_name || '—'}</td>
      <td>${f.flight_num}</td>
      <td>${f.weight}kg</td>
      <td>${f.takeoff} → ${f.landing}</td>
      <td>${f.time}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  el.innerHTML = html;
}

function sortToday(col) {
  if (todaySort.col === col) {
    todaySort.dir = todaySort.dir === 'asc' ? 'desc' : 'asc';
  } else {
    todaySort = { col, dir: 'asc' };
  }
  renderTodayTab();
}

// ─── Flights Tab ──────────────────────────────────────────────────────────────
function renderFlightsTab() {
  const term = flightsSearch.trim().toLowerCase();

  document.getElementById('pilot-export-btns').innerHTML = officePilots.map(p => {
    const isActive = term === p.name.toLowerCase();
    return `<button class="btn-export-pilot${isActive ? ' active' : ''}" onclick="filterByPilot('${p.name}')">${p.name}</button>`;
  }).join('');

  const el = document.getElementById('flights-table-container');
  if (allFlights.length === 0) {
    el.innerHTML = '<div class="empty-state">No flights logged yet</div>';
    return;
  }

  const filtered = term
    ? allFlights.filter(f =>
        (f.pilot_name || '').toLowerCase().includes(term) ||
        (f.client_name || '').toLowerCase().includes(term) ||
        f.date.includes(term) ||
        officeFmtDate(f.date).toLowerCase().includes(term)
      )
    : allFlights;

  const countEl = document.getElementById('flights-result-count');
  countEl.textContent = term ? `${filtered.length} of ${allFlights.length} flights` : '';

  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty-state">No flights match your search</div>';
    return;
  }

  const byDate = {};
  filtered.forEach(f => {
    if (!byDate[f.date]) byDate[f.date] = [];
    byDate[f.date].push(f);
  });

  let html = `<table class="flight-table">
    <thead><tr>
      <th>Date</th><th>Pilot</th><th>Client</th><th>#</th>
      <th>Weight</th><th>Site</th><th>Time</th><th>Notes</th>
    </tr></thead><tbody>`;

  Object.keys(byDate).sort().reverse().forEach(date => {
    byDate[date].forEach(f => {
      html += `<tr>
        <td>${officeFmtDate(date)}</td>
        <td class="pilot-col">${f.pilot_name}</td>
        <td class="client-col">${f.client_name || '—'}</td>
        <td>${f.flight_num}</td>
        <td>${f.weight}kg</td>
        <td>${f.takeoff} → ${f.landing}</td>
        <td>${f.time}min</td>
        <td class="time-col">${f.notes || ''}</td>
      </tr>`;
    });
  });

  html += '</tbody></table>';
  el.innerHTML = html;
}

function searchFlights(val) {
  flightsSearch = val;
  renderFlightsTab();
}

function filterByPilot(name) {
  flightsSearch = flightsSearch.toLowerCase() === name.toLowerCase() ? '' : name;
  const inp = document.getElementById('flights-search');
  if (inp) inp.value = flightsSearch;
  renderFlightsTab();
}

function officeFmtDate(s) {
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' });
}

function exportAllCSV() {
  downloadCSV(buildCSV(allFlights), 'gforce_flights_all.csv');
}
function exportPilotCSV(pilotId) {
  const pilot = officePilots.find(p => p.id === pilotId);
  const pilotFlights = allFlights.filter(f => f.pilot_id === pilotId);
  downloadCSV(buildCSV(pilotFlights), `gforce_flights_${pilot?.name || pilotId}.csv`);
}
function buildCSV(flights) {
  const header = ['Date','Pilot','Client Name','Flight #','Weight (kg)','Takeoff','Landing','Time (min)','Notes'];
  const rows = flights.map(f => [
    f.date, f.pilot_name||'', f.client_name||'', f.flight_num, f.weight,
    f.takeoff, f.landing, f.time, f.notes||''
  ]);
  return [header, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
}
function downloadCSV(csv, filename) {
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  toast('Downloading...');
}

// ─── Office Timers ────────────────────────────────────────────────────────────
function updateTimers() {
  clearInterval(timerInterval);
  function tick() {
    const now = Date.now();
    officePilots.forEach(p => {
      if (p.status !== 'airborne' || !p.timer_expires_at) return;
      const expires = new Date(p.timer_expires_at).getTime();
      const remaining = expires - now;
      const el = document.getElementById(`timer-${p.id}`);
      if (!el) return;
      if (remaining <= 0) {
        el.textContent = 'EXPIRED';
        el.classList.add('urgent');
        const card = document.getElementById(`pilot-card-${p.id}`);
        if (card) { card.classList.add('alert'); card.classList.remove('airborne'); }
        showAlert(p.name);
      } else {
        const mins = Math.floor(remaining / 60000);
        const secs = Math.floor((remaining % 60000) / 1000);
        el.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')} remaining`;
        el.classList.toggle('urgent', remaining < 600000);
      }
    });
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

function showAlert(pilotName) {
  if (alertDismissed.has(pilotName)) return;
  document.getElementById('alert-pilot-name').textContent = pilotName;
  document.getElementById('office-alert-banner').classList.add('show');
  setTimeout(() => dismissAlert(pilotName), 30000);
}
function dismissAlert(pilotName) {
  alertDismissed.add(pilotName);
  document.getElementById('office-alert-banner').classList.remove('show');
}

// ─── Office Tabs ──────────────────────────────────────────────────────────────
function showOfficeTab(name) {
  document.querySelectorAll('.office-tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.office-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`office-tab-${name}`).classList.add('active');
  document.getElementById(`office-tab-${name}-btn`).classList.add('active');
  if (name === 'ff') renderOfficeFF();
  if (name === 'groups') loadOfficeData();
}

// ─── WebSocket ────────────────────────────────────────────────────────────────
function connectWS() {
  ws = new WebSocket('wss://gforce-api.fly.dev');
  ws.onopen = () => {
    document.getElementById('ws-indicator').classList.add('connected');
    document.getElementById('ws-indicator').title = 'Connected';
  };
  ws.onclose = () => {
    document.getElementById('ws-indicator').classList.remove('connected');
    document.getElementById('ws-indicator').title = 'Disconnected';
    if (officeToken) setTimeout(connectWS, 5000);
  };
  ws.onerror = () => ws.close();
  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    switch (data.type) {
      case 'LEFT_OFFICE':
        toast(`${data.pilot_name} left office`);
        loadOfficeData();
        // If this is us, trigger pilot notification too
        if (pilotId && data.pilot_id === pilotId) {
          myStatus.status = 'airborne';
          myStatus.timer_expires_at = data.expires_at;
          renderDashboard();
          updateStatusBadge();
          notifyPilotSentAway();
        }
        break;
      case 'GROUP_LEFT_OFFICE':
        toast(`Group away: ${data.pilot_names.join(', ')}`);
        loadOfficeData();
        if (pilotId && data.pilot_ids.includes(pilotId)) {
          myStatus.status = 'airborne';
          myStatus.timer_expires_at = data.expires_at;
          myStatus.group_name = data.group_name;
          myStatus.group_pilots = data.pilot_names.filter(n => n !== pilotName);
          renderDashboard();
          updateStatusBadge();
          notifyPilotSentAway();
        }
        break;
      case 'LANDED':
      case 'LANDED_EARLY':
        toast(`${data.pilot_name} landed!`);
        dismissAlert(data.pilot_name);
        loadOfficeData();
        break;
      case 'TIMER_EXPIRED':
        toast(`⚠️ Timer expired for ${data.pilot_name}!`);
        loadOfficeData();
        break;
      case 'TIMER_EXTENDED':
        toast(`${data.pilot_name}: timer extended to +30 min`);
        loadOfficeData();
        break;
    }
  };
}

// ─── Office Utils ─────────────────────────────────────────────────────────────
function fmtRelative(isoString) {
  const d = new Date(isoString);
  const diff = Date.now() - d.getTime();
  const hrs = diff / 3600000;
  if (hrs < 24) return d.toLocaleTimeString('en-NZ', { hour: 'numeric', minute: '2-digit' });
  return d.toLocaleDateString('en-NZ', { day: 'numeric', month: 'short' });
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// ─── Pilot Sent-Away Notification ───────────────────────────────────────────
function notifyPilotSentAway() {
  // Sound alert
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523, 659, 784].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0.4, ctx.currentTime + i * 0.18);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.3);
      osc.start(ctx.currentTime + i * 0.18);
      osc.stop(ctx.currentTime + i * 0.18 + 0.35);
    });
  } catch (e) {}

  // Build group info for notification
  const groupInfo = myStatus.group_name ? `📋 ${myStatus.group_name}` : '';
  const groupPilotsList = (myStatus.group_pilots && myStatus.group_pilots.length)
    ? myStatus.group_pilots.join(', ')
    : '';
  const groupSection = (groupInfo || groupPilotsList) ? `
    <div style="margin:16px 0;padding:12px 16px;background:#1a1a1a;border-radius:10px;border:1px solid #333;">
      ${groupInfo ? `<div style="font-size:15px;font-weight:700;color:#f37329;margin-bottom:${groupPilotsList ? '6px' : '0'};">${groupInfo}</div>` : ''}
      ${groupPilotsList ? `<div style="font-size:13px;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Flying with</div>
      <div style="font-size:15px;font-weight:600;color:#f0f0f0;">${groupPilotsList}</div>` : ''}
    </div>` : '';

  // In-app modal
  const existing = document.getElementById('sent-away-modal');
  if (existing) existing.remove();
  const modal = document.createElement('div');
  modal.id = 'sent-away-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;';
  modal.innerHTML = `
    <div style="background:#222;border:2px solid #f37329;border-radius:16px;padding:32px 28px;text-align:center;max-width:340px;width:90%;">
      <div style="font-size:56px;margin-bottom:12px;">🪂</div>
      <div style="font-size:22px;font-weight:700;color:#f37329;font-family:Montserrat,sans-serif;letter-spacing:1px;margin-bottom:8px;">YOU'RE AWAY!</div>
      <div style="color:#ccc;font-size:14px;">Office has started your timer. Have a great flight!</div>
      ${groupSection}
      <button onclick="document.getElementById('sent-away-modal').remove()" style="background:#f37329;border:none;border-radius:9999px;color:#fff;font-size:16px;font-weight:700;padding:14px 32px;cursor:pointer;font-family:Montserrat,sans-serif;">GOT IT</button>
    </div>`;
  document.body.appendChild(modal);

  // Push notification (if permitted)
  const pushBody = groupPilotsList
    ? `You're away! Flying with ${groupPilotsList}.`
    : "You've been sent away! Timer started.";
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('GForce Flight Log', { body: pushBody, icon: '/gforce-flight-log/icon-192.png' });
  } else if ('Notification' in window && Notification.permission !== 'denied') {
    Notification.requestPermission().then(p => {
      if (p === 'granted') new Notification('GForce Flight Log', { body: pushBody, icon: '/gforce-flight-log/icon-192.png' });
    });
  }
}

// ─── Service Worker ───────────────────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/gforce-flight-log/sw.js').catch(() => {});
}
</script>
