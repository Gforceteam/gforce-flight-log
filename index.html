<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flight Log" />
  <link rel="apple-touch-icon" href="/gforce-flight-log/icon-192.png" />
  <link rel="manifest" href="/gforce-flight-log/manifest.json" />
  <title>Gforce Flight Log</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --card: #222;
      --border: #333;
      --accent: #4fc3f7;
      --accent2: #81c784;
      --danger: #ef5350;
      --text: #f0f0f0;
      --muted: #888;
      --radius: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* LOGIN */
    #login-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    #login-page h1 { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    #login-page .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 28px; }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }
    .login-card select, .login-card input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 12px 14px;
      font-size: 16px;
      outline: none;
      margin-bottom: 12px;
      appearance: none;
    }
    .login-card select:focus, .login-card input:focus { border-color: var(--accent); }
    .login-card button {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: var(--radius);
      color: #000;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 4px;
    }
    .login-card button:active { opacity: 0.8; }
    .login-error { color: var(--danger); font-size: 13px; margin-top: 10px; text-align: center; display: none; }
    #login-error { display: none; }

    /* APP */
    #app-page { display: none; }

    /* NAV */
    nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 100;
    }
    nav button {
      flex: 1;
      padding: 12px 0 16px;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: color 0.15s;
    }
    nav button.active { color: var(--accent); }
    nav button svg { width: 22px; height: 22px; }

    /* PAGES */
    .page { display: none; padding: 16px; max-width: 500px; margin: 0 auto; }
    .page.active { display: block; }

    /* HEADER */
    .page-header {
      padding: 16px 16px 0;
      max-width: 500px;
      margin: 0 auto;
    }
    .page-header h1 { font-size: 28px; font-weight: 700; padding-top: env(safe-area-inset-top, 16px); }
    .page-header p { color: var(--muted); font-size: 13px; margin-top: 2px; }

    /* PILOT BAR */
    .pilot-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 500px;
      margin: 0 auto;
    }
    .pilot-bar-left { display: flex; align-items: center; gap: 10px; }
    .pilot-avatar-sm {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--card); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--accent);
    }
    .pilot-greeting { font-size: 13px; color: var(--muted); }
    .pilot-name-sm { font-size: 14px; font-weight: 600; }
    .btn-logout {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      color: var(--muted); font-size: 12px; padding: 4px 10px; cursor: pointer;
    }

    /* CARDS */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; color: var(--accent); }
    .card.editing { border-color: var(--accent); }

    /* FORM */
    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .field input, .field select, .field textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 10px 12px;
      font-size: 16px;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field textarea { resize: vertical; min-height: 70px; font-size: 14px; }

    /* FLIGHT NUMBER STEPPER */
    .flight-num-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .flight-num-row label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      min-width: 90px;
    }
    .flight-num-controls {
      display: flex;
      align-items: center;
      flex: 1;
      gap: 6px;
    }
    .flight-num-btn {
      width: 40px; height: 40px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 20px; font-weight: 600; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      line-height: 1; padding: 0;
    }
    .flight-num-btn:active { background: var(--border); }
    .flight-num-display {
      flex: 1; text-align: center;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--accent);
      font-size: 18px; font-weight: 700;
      padding: 8px; min-width: 48px;
    }

    /* WEIGHT SLIDER */
    .weight-slider-row { display: flex; align-items: center; gap: 12px; }
    .weight-slider {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 6px; background: var(--border); border-radius: 3px;
      outline: none; cursor: pointer;
    }
    .weight-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 24px; height: 24px; background: var(--accent);
      border-radius: 50%; cursor: pointer;
    }
    .weight-slider::-moz-range-thumb {
      width: 24px; height: 24px; background: var(--accent);
      border-radius: 50%; cursor: pointer; border: none;
    }
    .weight-value {
      min-width: 52px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 16px; font-weight: 600;
      padding: 8px 10px; text-align: center;
    }

    /* BUTTON GROUPS */
    .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-group button {
      flex: 1; min-width: 48px; padding: 10px 8px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s;
    }
    .btn-group button.selected { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
    .btn-group.site button { font-size: 13px; }

    /* PRIMARY BUTTON */
    .btn-primary {
      width: 100%; padding: 14px;
      background: var(--accent); border: none; border-radius: var(--radius);
      color: #000; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 4px;
    }
    .btn-primary:active { opacity: 0.8; }
    .btn-secondary {
      width: 100%; padding: 12px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    .btn-cancel {
      width: 100%; padding: 12px; background: transparent;
      border: 1px solid var(--danger); border-radius: var(--radius);
      color: var(--danger); font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 8px;
    }
    .btn-danger {
      background: var(--surface); border: 1px solid var(--danger);
      border-radius: 8px; color: var(--danger);
      font-size: 13px; padding: 6px 12px; cursor: pointer;
    }
    .btn-edit {
      background: var(--surface); border: 1px solid var(--accent);
      border-radius: 8px; color: var(--accent);
      font-size: 13px; padding: 6px 10px; cursor: pointer;
    }

    /* FLIGHT LIST */
    .flight-item {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .flight-meta { font-size: 13px; color: var(--muted); margin-top: 2px; }
    .flight-badge {
      background: var(--accent); color: #000; border-radius: 20px;
      padding: 2px 10px; font-size: 12px; font-weight: 700;
    }
    .flight-badge.green { background: var(--accent2); }

    .date-group-header {
      font-size: 13px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      padding: 12px 0 6px; display: flex; justify-content: space-between; align-items: center;
    }
    .duty-badge {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; font-size: 11px; color: var(--accent2);
      padding: 2px 8px;
    }

    /* TOAST */
    #toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 20px;
      border-radius: 20px; font-size: 14px; opacity: 0;
      pointer-events: none; transition: opacity 0.3s; z-index: 999; white-space: nowrap;
    }
    #toast.show { opacity: 1; }

    /* STATS */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; text-align: center;
    }
    .stat-number { font-size: 28px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* EXPORT */
    .export-section { margin-bottom: 12px; }
    .week-row {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px 14px; margin-bottom: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .week-label { font-size: 14px; font-weight: 600; }
    .week-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }

    .duty-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px 14px; margin-bottom: 6px;
    }
    .duty-date { font-size: 13px; flex: 1; }
    .duty-input {
      width: 70px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); padding: 6px 8px;
      font-size: 15px; text-align: center;
    }
    .duty-label { font-size: 11px; color: var(--muted); }
    hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    .empty-state { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 15px; }

    /* SERVER STATUS */
    .server-badge {
      font-size: 11px; padding: 3px 8px; border-radius: 10px; font-weight: 600;
    }
    .server-badge.synced { background: var(--accent2); color: #000; }
    .server-badge.offline { background: var(--danger); color: #fff; }
  </style>
</head>
<body>

<!-- LOGIN PAGE -->
<div id="login-page">
  <h1>Gforce Flight Log</h1>
  <p class="subtitle">Pilot Portal</p>
  <div class="login-card">
    <select id="pilot-select">
      <option value="">Select pilot...</option>
    </select>
    <input type="password" id="pilot-pin" placeholder="Enter PIN" maxlength="8" inputmode="numeric" onkeydown="if(event.key==='Enter')doLogin()" />
    <button onclick="doLogin()">Sign In</button>
    <div id="login-error" class="login-error">Invalid PIN. Try again.</div>
    <div id="login-error2" class="login-error" style="display:none">Cannot reach server. Check your connection.</div>
  </div>
</div>

<!-- APP PAGE -->
<div id="app-page">
  <div class="pilot-bar">
    <div class="pilot-bar-left">
      <div class="pilot-avatar-sm" id="pilot-avatar">B</div>
      <div>
        <div class="pilot-greeting">Pilot</div>
        <div class="pilot-name-sm" id="pilot-name-display">Brooke</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <span class="server-badge" id="server-badge">...</span>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </div>

  <div class="page-header" id="header-log">
    <h1>Log Flight</h1>
    <p id="header-date"></p>
  </div>
  <div class="page-header" id="header-flights" style="display:none">
    <h1>My Flights</h1>
    <p id="header-flights-sub"></p>
  </div>
  <div class="page-header" id="header-stats" style="display:none">
    <h1>Stats</h1>
    <p>Season overview</p>
  </div>

  <!-- LOG PAGE -->
  <div class="page active" id="page-log">
    <div class="card" id="flight-card">
      <h2 id="card-title">New Flight</h2>

      <div class="flight-num-row">
        <label>Flight #</label>
        <div class="flight-num-controls">
          <button class="flight-num-btn" onclick="adjustFlightNum(-1)">−</button>
          <div class="flight-num-display" id="f-num-display">1</div>
          <button class="flight-num-btn" onclick="adjustFlightNum(1)">+</button>
        </div>
      </div>

      <div class="field">
        <label>Date</label>
        <input type="date" id="f-date" onchange="onDateChange()" />
      </div>

      <div class="field">
        <label>Client Weight (kg)</label>
        <div class="weight-slider-row">
          <input type="range" class="weight-slider" id="f-weight" min="15" max="120" value="72" oninput="updateWeightDisplay()" />
          <div class="weight-value" id="f-weight-display">72 kg</div>
        </div>
      </div>

      <div class="field">
        <label>Takeoff</label>
        <div class="btn-group site" id="fg-takeoff">
          <button data-val="E">E</button>
          <button data-val="W">W</button>
          <button data-val="G">G</button>
          <button data-val="CP">CP</button>
        </div>
      </div>

      <div class="field">
        <label>Landing</label>
        <div class="btn-group site" id="fg-landing">
          <button data-val="S">S</button>
          <button data-val="R">R</button>
          <button data-val="FP">FP</button>
          <button data-val="WP">WP</button>
        </div>
      </div>

      <div class="field">
        <label>Flight Time (min)</label>
        <div class="btn-group" id="fg-time">
          <button data-val="5">5</button>
          <button data-val="8">8</button>
          <button data-val="10" class="selected">10</button>
          <button data-val="12">12</button>
          <button data-val="15">15</button>
          <button data-val="20">20</button>
        </div>
      </div>

      <div class="field">
        <label>Photo Payment ($)</label>
        <input type="number" id="f-photos" min="0" step="5" placeholder="0" inputmode="numeric" />
      </div>

      <div class="field">
        <label>Notes</label>
        <textarea id="f-notes" placeholder="Optional..."></textarea>
      </div>

      <button class="btn-primary" id="save-btn" onclick="saveFlight()">Save Flight</button>
      <button class="btn-cancel" id="cancel-btn" onclick="cancelEdit()" style="display:none">Cancel Edit</button>
    </div>
  </div>

  <!-- FLIGHTS PAGE -->
  <div class="page" id="page-flights">
    <div id="flights-list"></div>
  </div>

  <!-- STATS PAGE -->
  <div class="page" id="page-stats">
    <div class="stats-grid" id="stats-grid"></div>
    <div class="card" id="stats-breakdown"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav id="bottom-nav" style="display:none">
  <button class="active" onclick="showPage('log')" id="nav-log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
    Log
  </button>
  <button onclick="showPage('flights')" id="nav-flights">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
    Flights
  </button>
  <button onclick="showPage('stats')" id="nav-stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    Stats
  </button>
</nav>

<div id="toast"></div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const API_BASE = 'https://gforce-api-6jpm.onrender.com';

// ─── State ────────────────────────────────────────────────────────────────────
let token = localStorage.getItem('gforce_pilot_token');
let pilotId = localStorage.getItem('gforce_pilot_id');
let pilotName = localStorage.getItem('gforce_pilot_name');
let editingId = null;
let myFlights = [];

// ─── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (token && pilotId) {
    showApp(pilotName);
  } else {
    loadPilotList();
  }
});

async function loadPilotList() {
  try {
    const res = await fetch(`${API_BASE}/api/public/pilots`);
    const pilots = await res.json();
    const sel = document.getElementById('pilot-select');
    sel.innerHTML = '<option value="">Select pilot...</option>';
    pilots.forEach(p => {
      sel.innerHTML += `<option value="${p.id}">${p.name}</option>`;
    });
    sel.value = pilotId || '';
  } catch {
    document.getElementById('login-error2').style.display = 'block';
    document.getElementById('login-error2').textContent = 'Cannot reach server';
  }
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function doLogin() {
  const select = document.getElementById('pilot-select');
  const name = select.options[select.selectedIndex].text;
  const pin = document.getElementById('pilot-pin').value;
  document.getElementById('login-error').style.display = 'none';
  document.getElementById('login-error2').style.display = 'none';

  if (!select.value || !pin) {
    document.getElementById('login-error').textContent = 'Select pilot and enter PIN';
    document.getElementById('login-error').style.display = 'block';
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/api/auth/pilot`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, pin })
    });
    const data = await res.json();

    if (data.token) {
      token = data.token;
      pilotId = data.pilot.id;
      pilotName = data.pilot.name;
      localStorage.setItem('gforce_pilot_token', token);
      localStorage.setItem('gforce_pilot_id', pilotId);
      localStorage.setItem('gforce_pilot_name', pilotName);
      showApp(pilotName);
    } else {
      document.getElementById('login-error').style.display = 'block';
    }
  } catch {
    document.getElementById('login-error2').style.display = 'block';
    document.getElementById('login-error2').textContent = 'Cannot reach server';
  }
}

function doLogout() {
  token = pilotId = pilotName = null;
  localStorage.removeItem('gforce_pilot_token');
  localStorage.removeItem('gforce_pilot_id');
  localStorage.removeItem('gforce_pilot_name');
  document.getElementById('app-page').style.display = 'none';
  document.getElementById('bottom-nav').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('pilot-pin').value = '';
  loadPilotList();
}

// ─── App Shell ────────────────────────────────────────────────────────────────
function showApp(name) {
  document.getElementById('login-page').style.display = 'none';
  document.getElementById('app-page').style.display = 'block';
  document.getElementById('bottom-nav').style.display = 'flex';
  document.getElementById('pilot-name-display').textContent = name;
  document.getElementById('pilot-avatar').textContent = name.charAt(0).toUpperCase();

  // Set date
  const dateEl = document.getElementById('f-date');
  dateEl.value = todayStr();
  document.getElementById('header-date').textContent = fmtDate(todayStr());
  updateWeightDisplay();
  setupBtnGroups();
  updateFlightNumForDate(dateEl.value);
}

// ─── API Helpers ─────────────────────────────────────────────────────────────
function api(path, opts = {}) {
  return fetch(`${API_BASE}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...opts.headers
    }
  });
}

// ─── Date Utils ───────────────────────────────────────────────────────────────
function todayStr() {
  return new Date().toISOString().split('T')[0];
}
function fmtDate(s) {
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-NZ', { weekday:'short', day:'numeric', month:'short' });
}
function getWeekStart(dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDay();
  const diff = (day === 0) ? -6 : 1 - day;
  d.setDate(d.getDate() + diff);
  return d.toISOString().split('T')[0];
}
function getWeekEnd(weekStart) {
  const d = new Date(weekStart + 'T00:00:00');
  d.setDate(d.getDate() + 6);
  return d.toISOString().split('T')[0];
}
function formatWeekLabel(ws) {
  const we = getWeekEnd(ws);
  const a = new Date(ws + 'T00:00:00');
  const b = new Date(we + 'T00:00:00');
  return `${a.toLocaleDateString('en-NZ',{day:'numeric',month:'short'})} – ${b.toLocaleDateString('en-NZ',{day:'numeric',month:'short',year:'numeric'})}`;
}

// ─── Button Groups ─────────────────────────────────────────────────────────────
function setupBtnGroups() {
  document.querySelectorAll('.btn-group').forEach(group => {
    group.addEventListener('click', e => {
      const btn = e.target.closest('button');
      if (!btn) return;
      group.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
    });
  });
}
function getGroupVal(id) {
  const sel = document.querySelector(`#${id} button.selected`);
  return sel ? sel.dataset.val : null;
}
function setGroupVal(id, val) {
  const btn = document.querySelector(`#${id} button[data-val="${val}"]`);
  if (btn) {
    document.querySelectorAll(`#${id} button`).forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
  }
}

// ─── Weight Slider ─────────────────────────────────────────────────────────────
function updateWeightDisplay() {
  document.getElementById('f-weight-display').textContent = document.getElementById('f-weight').value + ' kg';
}

// ─── Flight Number ─────────────────────────────────────────────────────────────
function updateFlightNumForDate(date) {
  if (editingId !== null) return;
  const today = myFlights.filter(f => f.date === date);
  document.getElementById('f-num-display').textContent = today.length + 1;
}
function adjustFlightNum(delta) {
  const display = document.getElementById('f-num-display');
  const current = parseInt(display.textContent);
  display.textContent = Math.max(1, current + delta);
}
function onDateChange() {
  const date = document.getElementById('f-date').value;
  document.getElementById('header-date').textContent = fmtDate(date);
  updateFlightNumForDate(date);
}

// ─── Save Flight ───────────────────────────────────────────────────────────────
async function saveFlight() {
  const date = document.getElementById('f-date').value;
  const flightNum = parseInt(document.getElementById('f-num-display').textContent);
  const weight = document.getElementById('f-weight').value;
  const takeoff = getGroupVal('fg-takeoff');
  const landing = getGroupVal('fg-landing');
  const time = getGroupVal('fg-time');
  const photos = document.getElementById('f-photos').value || '0';
  const notes = document.getElementById('f-notes').value;

  if (!date || !flightNum || !weight || !takeoff || !landing || !time) {
    toast('Fill in all required fields');
    return;
  }

  setServerStatus('syncing');

  try {
    if (editingId !== null) {
      // For now, editing just removes and re-adds (PUT not implemented)
      const res = await api('/api/flights', {
        method: 'POST',
        body: JSON.stringify({ date, flight_num: flightNum, weight, takeoff, landing, time, photos, notes })
      });
      if (!res.ok) throw new Error(await res.text());
      // Remove old flight with same approximate data, reload
      cancelEdit();
      toast('Flight updated!');
    } else {
      const res = await api('/api/flights', {
        method: 'POST',
        body: JSON.stringify({ date, flight_num: flightNum, weight, takeoff, landing, time, photos, notes })
      });
      if (!res.ok) throw new Error(await res.text());
      toast('Flight logged! Office notified.');
    }

    // Reset form
    document.getElementById('f-weight').value = 72;
    document.getElementById('f-photos').value = '';
    document.getElementById('f-notes').value = '';
    updateWeightDisplay();
    document.querySelector('#fg-time button.selected')?.classList.remove('selected');
    document.querySelector('#fg-time button[data-val="10"]').classList.add('selected');
    updateFlightNumForDate(date);

    await loadMyFlights();
  } catch (e) {
    toast('Save failed: ' + e.message);
    setServerStatus('offline');
  }
}

function cancelEdit() {
  editingId = null;
  document.getElementById('card-title').textContent = 'New Flight';
  document.getElementById('save-btn').textContent = 'Save Flight';
  document.getElementById('cancel-btn').style.display = 'none';
  document.getElementById('flight-card').classList.remove('editing');
  document.getElementById('f-weight').value = 72;
  document.getElementById('f-photos').value = '';
  document.getElementById('f-notes').value = '';
  document.querySelector('#fg-takeoff button.selected')?.classList.remove('selected');
  document.querySelector('#fg-landing button.selected')?.classList.remove('selected');
  document.querySelector('#fg-time button.selected')?.classList.remove('selected');
  document.querySelector('#fg-time button[data-val="10"]').classList.add('selected');
  updateWeightDisplay();
  const dateEl = document.getElementById('f-date');
  dateEl.value = todayStr();
  document.getElementById('header-date').textContent = fmtDate(todayStr());
  updateFlightNumForDate(dateEl.value);
}

function setServerStatus(status) {
  const badge = document.getElementById('server-badge');
  if (status === 'syncing') {
    badge.textContent = '...'; badge.className = 'server-badge';
  } else if (status === 'synced') {
    badge.textContent = 'Synced'; badge.className = 'server-badge synced';
  } else {
    badge.textContent = 'Offline'; badge.className = 'server-badge offline';
  }
}

// ─── Edit Flight ───────────────────────────────────────────────────────────────
function editFlight(id) {
  const f = myFlights.find(fl => fl.id === id);
  if (!f) return;

  editingId = id;

  document.getElementById('f-date').value = f.date;
  document.getElementById('header-date').textContent = fmtDate(f.date);
  document.getElementById('f-num-display').textContent = f.flight_num;
  document.getElementById('f-weight').value = f.weight;
  updateWeightDisplay();
  setGroupVal('fg-takeoff', f.takeoff);
  setGroupVal('fg-landing', f.landing);
  setGroupVal('fg-time', String(f.time));
  document.getElementById('f-photos').value = f.photos > 0 ? f.photos : '';
  document.getElementById('f-notes').value = f.notes || '';

  showPage('log');
  document.getElementById('card-title').textContent = 'Edit Flight';
  document.getElementById('save-btn').textContent = 'Update Flight';
  document.getElementById('cancel-btn').style.display = 'block';
  document.getElementById('flight-card').classList.add('editing');
}

// ─── Flights Page ─────────────────────────────────────────────────────────────
async function loadMyFlights() {
  try {
    const res = await api('/api/flights');
    if (res.status === 401) { doLogout(); return; }
    myFlights = await res.json();
    renderFlights();
    setServerStatus('synced');
  } catch {
    setServerStatus('offline');
  }
}

function renderFlights() {
  const flights = myFlights.slice().reverse();
  const el = document.getElementById('flights-list');

  if (flights.length === 0) {
    el.innerHTML = '<div class="empty-state">No flights logged yet</div>';
    return;
  }

  const byDate = {};
  flights.forEach(f => {
    if (!byDate[f.date]) byDate[f.date] = [];
    byDate[f.date].push(f);
  });

  let html = '';
  Object.keys(byDate).sort().reverse().forEach(date => {
    const dayFlights = byDate[date];
    html += `<div class="date-group-header">
      ${fmtDate(date)}
      <span class="duty-badge">${dayFlights.length} flights</span>
    </div>`;
    dayFlights.sort((a,b) => a.flight_num - b.flight_num).forEach(f => {
      html += `<div class="flight-item">
        <div>
          <div style="font-size:14px;font-weight:600">Flight ${f.flight_num} · ${f.weight}kg · ${f.time}min</div>
          <div class="flight-meta">${f.takeoff} → ${f.landing}${f.photos > 0 ? ' · $'+f.photos+' photos' : ''}${f.notes ? ' · '+f.notes : ''}</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center">
          ${f.photos > 0 ? `<span class="flight-badge green">$${f.photos}</span>` : ''}
          <button class="btn-edit" onclick="editFlight('${f.id}')">&#9998;</button>
          <button class="btn-danger" onclick="deleteFlight('${f.id}')">✕</button>
        </div>
      </div>`;
    });
  });

  el.innerHTML = html;

  const today = myFlights.filter(f => f.date === todayStr());
  document.getElementById('header-flights-sub').textContent =
    `${myFlights.length} total · ${today.length} today`;
}

async function deleteFlight(id) {
  if (!confirm('Delete this flight? This cannot be undone.')) return;
  // For now, we don't have a delete endpoint — notify office manually
  toast('Contact office to delete flight');
}

// ─── Stats Page ───────────────────────────────────────────────────────────────
function renderStats() {
  const flights = myFlights;
  if (flights.length === 0) {
    document.getElementById('stats-grid').innerHTML = '<div class="empty-state" style="grid-column:1/-1">No flights yet</div>';
    document.getElementById('stats-breakdown').innerHTML = '';
    return;
  }
  const totalPhotos = flights.reduce((s,f) => s + (f.photos || 0), 0);
  const today = flights.filter(f => f.date === todayStr());

  const ws = getWeekStart(todayStr());
  const we = getWeekEnd(ws);
  const weekFlights = flights.filter(f => f.date >= ws && f.date <= we);

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-number">${flights.length}</div><div class="stat-label">Total Flights</div></div>
    <div class="stat-card"><div class="stat-number">${today.length}</div><div class="stat-label">Today</div></div>
    <div class="stat-card"><div class="stat-number">${weekFlights.length}</div><div class="stat-label">This Week</div></div>
    <div class="stat-card"><div class="stat-number">$${totalPhotos}</div><div class="stat-label">Photo Revenue</div></div>
  `;

  const sites = {};
  flights.forEach(f => { sites[f.takeoff] = (sites[f.takeoff]||0)+1; });
  const siteRows = Object.entries(sites).sort((a,b)=>b[1]-a[1])
    .map(([k,v]) => `<div class="flight-item"><div>${k}</div><span class="flight-badge">${v} flights</span></div>`).join('');

  document.getElementById('stats-breakdown').innerHTML = `<h2>By Takeoff Site</h2>${siteRows}`;
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.page-header').forEach(h => h.style.display = 'none');

  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  document.getElementById('header-'+name).style.display = 'block';

  if (name === 'flights') { loadMyFlights(); }
  if (name === 'stats') { loadMyFlights().then(renderStats); }
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2500);
}

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/gforce-flight-log/sw.js').catch(() => {});
}
</script>
